<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage Layout Planner · CANAVA</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #363675;
  --paper:  #f4f1ec;
  --accent: #c94f2a;
  --green:  #2d7d4f;
  --blue:   #2a6b9c;
  --muted:  rgba(54,54,117,0.45);
  --border: rgba(54,54,117,0.18);
  --cell:   24px;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
.header {
  background: #ebe7e0;
  background-image:
    linear-gradient(rgba(54,54,117,.12) 1px, transparent 1px),
    linear-gradient(90deg, rgba(54,54,117,.12) 1px, transparent 1px),
    linear-gradient(rgba(54,54,117,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(54,54,117,.05) 1px, transparent 1px);
  background-size: 100px 100px, 100px 100px, 20px 20px, 20px 20px;
  padding: 16px 32px;
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-shrink: 0;
}
.header-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 6px;
}
.pulse-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.25; transform:scale(.6); }
}
.header-title { font-size:19px; font-weight:500; color:var(--ink); letter-spacing:-.01em; }
.header-sub   { font-size:11px; color:var(--muted); font-weight:300; font-style:italic; }

/* ── TOOLBAR ─────────────────────────────────────────────────────── */
.toolbar {
  background: rgba(255,255,255,.72);
  border-bottom: 1px solid var(--border);
  padding: 7px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.tb-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8.5px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
}
.tgl-group {
  display: flex;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.tgl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  letter-spacing: .05em;
  padding: 4px 13px;
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  transition: background .12s, color .12s;
  white-space: nowrap;
}
.tgl.active { background: var(--ink); color: var(--paper); }
.tgl + .tgl  { border-left: 1.5px solid var(--border); }
.tb-btn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9.5px;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: 4px 13px;
  background: transparent;
  border: 1.5px solid var(--border);
  border-radius: 3px;
  color: var(--ink);
  cursor: pointer;
  transition: background .12s, border-color .12s;
}
.tb-btn:hover { background: rgba(54,54,117,.06); border-color: rgba(54,54,117,.32); }
.tb-btn.save  { border-color: rgba(45,125,79,.55); color: var(--green); }
.tb-btn.save:hover { background: rgba(45,125,79,.07); border-color: var(--green); }
.tb-div { width:1px; height:20px; background:var(--border); flex-shrink:0; }
.tb-dims {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .08em;
  margin-left: auto;
}

/* ── MAIN ────────────────────────────────────────────────────────── */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── PALETTE ─────────────────────────────────────────────────────── */
.palette {
  width: 220px;
  flex-shrink: 0;
  background: rgba(255,255,255,.52);
  border-right: 1.5px solid var(--border);
  overflow-y: auto;
  padding-bottom: 24px;
}
.palette::-webkit-scrollbar { width:5px; }
.palette::-webkit-scrollbar-track { background:transparent; }
.palette::-webkit-scrollbar-thumb { background:rgba(54,54,117,.18); border-radius:3px; }

.pal-cat {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  letter-spacing: .24em;
  text-transform: uppercase;
  color: var(--muted);
  padding: 12px 14px 5px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}
.pal-cat:first-child { border-top:none; margin-top:0; padding-top:8px; }

.pal-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 6px 13px 6px 11px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .1s;
  user-select: none;
}
.pal-item:hover { background: rgba(54,54,117,.05); }
.pal-item:active { background: rgba(54,54,117,.09); }

.pal-swatch {
  width: 28px;
  height: 16px;
  border-radius: 2px;
  flex-shrink: 0;
  opacity: .88;
}
.pal-info { flex:1; min-width:0; }
.pal-name {
  font-size: 11.5px;
  font-weight: 400;
  color: var(--ink);
  line-height: 1.3;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pal-dim {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8.5px;
  color: var(--muted);
  letter-spacing: .04em;
  white-space: nowrap;
}
.pal-warn {
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px;
  color: var(--accent);
  letter-spacing: .04em;
}
.pal-plus {
  font-size: 16px;
  color: rgba(54,54,117,.22);
  flex-shrink: 0;
  line-height: 1;
  transition: color .1s;
}
.pal-item:hover .pal-plus { color: var(--ink); }

/* ── CANVAS WRAP ─────────────────────────────────────────────────── */
.canvas-wrap {
  flex: 1;
  overflow: auto;
  padding: 48px;
  background-color: var(--paper);
  background-image:
    linear-gradient(rgba(54,54,117,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(54,54,117,.05) 1px, transparent 1px);
  background-size: 20px 20px;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}
.canvas-wrap::-webkit-scrollbar { width:6px; height:6px; }
.canvas-wrap::-webkit-scrollbar-track { background:transparent; }
.canvas-wrap::-webkit-scrollbar-thumb { background:rgba(54,54,117,.18); border-radius:3px; }

/* ── ROOM ────────────────────────────────────────────────────────── */
#room {
  position: relative;
  background: rgba(250,248,244,.97);
  border: 3px solid var(--ink);
  flex-shrink: 0;
  background-image:
    linear-gradient(rgba(54,54,117,.11) 1px, transparent 1px),
    linear-gradient(90deg, rgba(54,54,117,.11) 1px, transparent 1px);
  background-size: 24px 24px;
}

.wall-lbl {
  position: absolute;
  font-family: 'Share Tech Mono', monospace;
  font-size: 7.5px;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: rgba(54,54,117,.3);
  pointer-events: none;
  white-space: nowrap;
}
.wl-back  { top:-20px;   left:50%; transform:translateX(-50%); }
.wl-front { bottom:-20px;left:50%; transform:translateX(-50%); }
.wl-left  { left:-32px;  top:50%; transform:translateY(-50%) rotate(-90deg); }
.wl-right { right:-34px; top:50%; transform:translateY(-50%) rotate(90deg); }

/* ft markers along walls */
.ft-mark {
  position: absolute;
  font-family: 'Share Tech Mono', monospace;
  font-size: 6px;
  color: rgba(54,54,117,.18);
  pointer-events: none;
  line-height: 1;
}

/* ── FLOOR ITEMS ─────────────────────────────────────────────────── */
.fi {
  position: absolute;
  border-radius: 2px;
  cursor: grab;
  user-select: none;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  transition: box-shadow .12s;
  border: 1.5px solid rgba(255,255,255,.28);
}
.fi:hover { box-shadow: 0 2px 10px rgba(0,0,0,.22); z-index:100 !important; }
.fi.dragging {
  cursor: grabbing;
  box-shadow: 0 6px 24px rgba(0,0,0,.28);
  z-index: 9000 !important;
  opacity: .88;
  transition: none;
}
.fi.selected {
  box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--ink);
  z-index: 500 !important;
}
.fi-lbl {
  font-family: 'Share Tech Mono', monospace;
  font-size: 7.5px;
  letter-spacing: .06em;
  color: rgba(255,255,255,.92);
  text-align: center;
  padding: 2px 3px;
  line-height: 1.35;
  pointer-events: none;
  text-shadow: 0 1px 3px rgba(0,0,0,.4);
}
.fi-rm {
  position: absolute;
  top: 2px; right: 2px;
  width: 14px; height: 14px;
  background: rgba(0,0,0,.35);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: rgba(255,255,255,.9);
  cursor: pointer;
  opacity: 0;
  transition: opacity .12s;
  z-index: 10;
  line-height: 1;
  font-family: Arial, sans-serif;
}
.fi:hover .fi-rm,
.fi.selected .fi-rm { opacity: 1; }
.fi-warn {
  position: absolute;
  bottom: 2px;
  left: 50%; transform: translateX(-50%);
  font-family: 'Share Tech Mono', monospace;
  font-size: 6.5px;
  color: rgba(255,215,130,.9);
  pointer-events: none;
  white-space: nowrap;
  text-shadow: 0 1px 2px rgba(0,0,0,.5);
}

/* ── STATUS BAR ──────────────────────────────────────────────────── */
.statusbar {
  height: 24px;
  background: rgba(54,54,117,.06);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 18px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 8.5px;
  color: var(--muted);
  letter-spacing: .09em;
  flex-shrink: 0;
}
.sb-dot { width:5px; height:5px; border-radius:50%; background:var(--green); flex-shrink:0; }

/* ── TOAST ───────────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 36px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--ink);
  color: rgba(255,255,255,.92);
  padding: 7px 18px;
  border-radius: 3px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: .1em;
  opacity: 0;
  transition: opacity .18s, transform .18s;
  pointer-events: none;
  z-index: 9999;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-tag"><span class="pulse-dot"></span>CANAVA Tools</div>
  <span class="header-title">Storage Layout Planner</span>
  <span class="header-sub">GoodFriend · Safe Haven · 2026</span>
</div>

<div class="toolbar">
  <span class="tb-lbl">Unit</span>
  <div class="tgl-group">
    <button class="tgl active" id="btn-1015" onclick="setUnit('10x15')">10 × 15</button>
    <button class="tgl"        id="btn-1020" onclick="setUnit('10x20')">10 × 20</button>
  </div>
  <div class="tb-div"></div>
  <span class="tb-lbl">Labels</span>
  <div class="tgl-group">
    <button class="tgl active" id="btn-lon"  onclick="setLabels(true)">On</button>
    <button class="tgl"        id="btn-loff" onclick="setLabels(false)">Off</button>
  </div>
  <div class="tb-div"></div>
  <button class="tb-btn save" onclick="saveLayout()">↓ Save</button>
  <button class="tb-btn"      onclick="loadLayout()">↑ Load</button>
  <button class="tb-btn"      onclick="clearLayout()">✕ Clear</button>
  <span class="tb-dims" id="tb-dims">10 × 15 ft · 150 sq ft</span>
</div>

<div class="main">
  <div class="palette" id="palette"></div>
  <div class="canvas-wrap" id="cWrap">
    <div id="room">
      <div class="wall-lbl wl-back">Back wall</div>
      <div class="wall-lbl wl-front">Door / entry</div>
      <div class="wall-lbl wl-left">Wall</div>
      <div class="wall-lbl wl-right">Wall</div>
    </div>
  </div>
</div>

<div class="statusbar">
  <span class="sb-dot"></span>
  <span id="sb-items">0 items placed</span>
  <span>·</span>
  <span id="sb-save">unsaved</span>
  <span>·</span>
  <span>click palette to add · drag to move · hover × to remove</span>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────────────────
// CANAVA · Storage Layout Planner
//
// Save/load: localStorage (v1)
// Supabase swap: replace saveRaw() and loadRaw() with fetch() calls:
//   POST  https://YOUR.supabase.co/rest/v1/layouts  { name, data }
//   GET   https://YOUR.supabase.co/rest/v1/layouts?name=eq.default
//   Headers: apikey: ANON_KEY, Content-Type: application/json
// ─────────────────────────────────────────────────────────────────────────

const CELL = 24;          // px per 6-inch grid square
const STORAGE_KEY = 'canava-layout-v1';

const UNITS = {
  '10x15': { w:20, h:30, label:'10 × 15 ft · 150 sq ft' },
  '10x20': { w:20, h:40, label:'10 × 20 ft · 200 sq ft' },
};

// Item definitions — w/h in grid cells (1 cell = 6 in)
const DEFS = [
  // ── ART ───────────────────────────────────────────────────────────
  { id:'art-roll9-up',  cat:'ART',    name:'Rolled canvas 9×9',    sub:'upright · 6in diam',  warn:'⚠ 9ft ceiling needed', w:1,  h:1,  color:'#c94f2a' },
  { id:'art-roll9-hz',  cat:'ART',    name:'Rolled canvas 9×9',    sub:'horizontal · on shelf',warn:null,                   w:18, h:2,  color:'#c94f2a' },
  { id:'art-c7',        cat:'ART',    name:'Canvas 7×7 stretched',  sub:'boxed · 7ft × 2ft',   warn:null,                   w:14, h:4,  color:'#b44520' },
  { id:'art-c4',        cat:'ART',    name:'Canvas 4×5 stretched',  sub:'boxed · 5ft × 2ft',   warn:null,                   w:10, h:4,  color:'#9e3b1c' },
  { id:'art-roll-sm',   cat:'ART',    name:'Rolled painting',        sub:'~4ft long',            warn:null,                   w:8,  h:1,  color:'#8a3118' },
  { id:'art-box-sm',    cat:'ART',    name:'Small works box',        sub:'3 × 2ft footprint',    warn:null,                   w:6,  h:4,  color:'#762914' },
  // ── BINS + SHELVING ───────────────────────────────────────────────
  { id:'bin-stack',     cat:'BINS',   name:'Bin stack column',       sub:'2 × 2ft · stacked 5×', warn:null,                   w:4,  h:4,  color:'#2a6b9c' },
  { id:'metro-shelf',   cat:'BINS',   name:'Metro shelving',         sub:'2ft × 18in · casters', warn:null,                   w:4,  h:3,  color:'#215882' },
  // ── ROLLING ──────────────────────────────────────────────────────
  { id:'rack-a',        cat:'ROLL',   name:'Rolling rack A',         sub:'3 × 2ft footprint',    warn:null,                   w:6,  h:4,  color:'#2d7d4f' },
  { id:'rack-b',        cat:'ROLL',   name:'Rolling rack B',         sub:'3 × 2ft footprint',    warn:null,                   w:6,  h:4,  color:'#246641' },
  { id:'hm-chair',      cat:'ROLL',   name:'Herman Miller chair',    sub:'2 × 2ft footprint',    warn:null,                   w:4,  h:4,  color:'#1e5535' },
  { id:'fold-table',    cat:'ROLL',   name:'Folding table',          sub:'4 × 2ft footprint',    warn:null,                   w:8,  h:4,  color:'#184428' },
  // ── CORNER + MISC ────────────────────────────────────────────────
  { id:'backdrop',      cat:'CORNER', name:'Backdrop tube',          sub:'5ft × 6in · wall',     warn:null,                   w:10, h:1,  color:'#363675' },
  { id:'steamer',       cat:'CORNER', name:'Steamer',                sub:'1 × 1ft footprint',    warn:null,                   w:2,  h:2,  color:'#2d2d62' },
  { id:'sewing',        cat:'CORNER', name:'Sewing machine',         sub:'2 × 1ft footprint',    warn:null,                   w:4,  h:2,  color:'#24244e' },
  { id:'appl-box',      cat:'CORNER', name:'Small appliances box',   sub:'2 × 2ft footprint',    warn:null,                   w:4,  h:4,  color:'#1c1c3d' },
];

const CAT_META = {
  ART:    { label:'Art' },
  BINS:   { label:'Bins + Shelving' },
  ROLL:   { label:'Rolling items' },
  CORNER: { label:'Corner + misc' },
};

// ── STATE ─────────────────────────────────────────────────────────────
const S = { unit:'10x15', labels:true, items:[], seq:1 };

// ── INIT ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildPalette();
  renderRoom();
});

// ── PALETTE ───────────────────────────────────────────────────────────
function buildPalette() {
  const el = document.getElementById('palette');
  el.innerHTML = '';
  ['ART','BINS','ROLL','CORNER'].forEach(cat => {
    const h = document.createElement('div');
    h.className = 'pal-cat';
    h.textContent = CAT_META[cat].label;
    el.appendChild(h);
    DEFS.filter(d => d.cat === cat).forEach(def => {
      const row = document.createElement('div');
      row.className = 'pal-item';
      row.innerHTML = `
        <div class="pal-swatch" style="background:${def.color}"></div>
        <div class="pal-info">
          <div class="pal-name">${def.name}</div>
          <div class="pal-dim">${def.sub}</div>
          ${def.warn ? `<div class="pal-warn">${def.warn}</div>` : ''}
        </div>
        <div class="pal-plus">+</div>
      `;
      row.addEventListener('click', () => addItem(def.id));
      el.appendChild(row);
    });
  });
}

// ── ROOM ──────────────────────────────────────────────────────────────
function renderRoom() {
  const room = document.getElementById('room');
  const u = UNITS[S.unit];
  room.style.width  = (u.w * CELL) + 'px';
  room.style.height = (u.h * CELL) + 'px';
  room.style.backgroundSize = `${CELL}px ${CELL}px`;
  document.getElementById('tb-dims').textContent = u.label;

  // Drop existing floor items (keep wall labels)
  room.querySelectorAll('.fi').forEach(e => e.remove());
  room.querySelectorAll('.ft-mark').forEach(e => e.remove());

  // Foot markers along top and left edges
  for (let ft = 2; ft < u.w/2; ft += 2) {
    const m = document.createElement('div');
    m.className = 'ft-mark';
    m.textContent = ft + '′';
    m.style.top = '3px';
    m.style.left = (ft * 2 * CELL - 6) + 'px';
    room.appendChild(m);
  }
  for (let ft = 2; ft < u.h/2; ft += 2) {
    const m = document.createElement('div');
    m.className = 'ft-mark';
    m.textContent = ft + '′';
    m.style.left = '3px';
    m.style.top  = (ft * 2 * CELL - 6) + 'px';
    room.appendChild(m);
  }

  S.items.forEach(item => renderItem(item));
  updateStatus();
}

function renderItem(item) {
  const def = DEFS.find(d => d.id === item.defId);
  if (!def) return;
  const room = document.getElementById('room');

  const el = document.createElement('div');
  el.className = 'fi';
  el.id = 'fi-' + item.iid;
  el.style.cssText = `
    left:${item.x * CELL}px;
    top:${item.y * CELL}px;
    width:${def.w * CELL}px;
    height:${def.h * CELL}px;
    background-color:${def.color};
    z-index:${item.iid};
  `;

  const lbl = document.createElement('div');
  lbl.className = 'fi-lbl';
  lbl.textContent = def.name;
  if (!S.labels) lbl.style.display = 'none';
  el.appendChild(lbl);

  if (def.warn) {
    const w = document.createElement('div');
    w.className = 'fi-warn';
    w.textContent = def.warn;
    if (!S.labels) w.style.display = 'none';
    el.appendChild(w);
  }

  const rm = document.createElement('div');
  rm.className = 'fi-rm';
  rm.textContent = '×';
  rm.addEventListener('click', e => { e.stopPropagation(); removeItem(item.iid); });
  el.appendChild(rm);

  el.addEventListener('mousedown', e => startDrag(e, item.iid));
  room.appendChild(el);
}

// ── ADD / REMOVE ──────────────────────────────────────────────────────
function addItem(defId) {
  const def = DEFS.find(d => d.id === defId);
  if (!def) return;
  const u = UNITS[S.unit];
  const same = S.items.filter(i => i.defId === defId).length;
  const off = (same % 5);
  const item = {
    iid: S.seq++,
    defId,
    x: Math.max(0, Math.min(u.w - def.w, off)),
    y: Math.max(0, Math.min(u.h - def.h, off)),
  };
  S.items.push(item);
  renderItem(item);
  updateStatus();
  markUnsaved();
  showToast(def.name + ' added');
}

function removeItem(iid) {
  S.items = S.items.filter(i => i.iid !== iid);
  const el = document.getElementById('fi-' + iid);
  if (el) el.remove();
  updateStatus();
  markUnsaved();
}

// ── DRAG ──────────────────────────────────────────────────────────────
let drag = null;

function startDrag(e, iid) {
  if (e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation();
  const item = S.items.find(i => i.iid === iid);
  const def  = DEFS.find(d => d.id === item.defId);
  const el   = document.getElementById('fi-' + iid);
  document.querySelectorAll('.fi.selected').forEach(f => f.classList.remove('selected'));
  el.classList.add('selected','dragging');
  drag = { iid, item, def, el,
           mx0:e.clientX, my0:e.clientY,
           ix0:item.x,    iy0:item.y };
}

document.addEventListener('mousemove', e => {
  if (!drag) return;
  const u = UNITS[S.unit];
  const dx = e.clientX - drag.mx0;
  const dy = e.clientY - drag.my0;
  let nx = Math.round((drag.ix0 * CELL + dx) / CELL);
  let ny = Math.round((drag.iy0 * CELL + dy) / CELL);
  nx = Math.max(0, Math.min(u.w - drag.def.w, nx));
  ny = Math.max(0, Math.min(u.h - drag.def.h, ny));
  drag.el.style.left = (nx * CELL) + 'px';
  drag.el.style.top  = (ny * CELL) + 'px';
  drag.item.x = nx;
  drag.item.y = ny;
});

document.addEventListener('mouseup', () => {
  if (!drag) return;
  drag.el.classList.remove('dragging');
  drag = null;
  markUnsaved();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.fi'))
    document.querySelectorAll('.fi.selected').forEach(f => f.classList.remove('selected'));
});

// ── UNIT TOGGLE ───────────────────────────────────────────────────────
function setUnit(u) {
  S.unit = u;
  document.getElementById('btn-1015').classList.toggle('active', u === '10x15');
  document.getElementById('btn-1020').classList.toggle('active', u === '10x20');
  const dims = UNITS[u];
  S.items.forEach(item => {
    const def = DEFS.find(d => d.id === item.defId);
    item.x = Math.max(0, Math.min(dims.w - def.w, item.x));
    item.y = Math.max(0, Math.min(dims.h - def.h, item.y));
  });
  renderRoom();
  markUnsaved();
}

// ── LABELS TOGGLE ─────────────────────────────────────────────────────
function setLabels(on) {
  S.labels = on;
  document.getElementById('btn-lon').classList.toggle('active', on);
  document.getElementById('btn-loff').classList.toggle('active', !on);
  document.querySelectorAll('.fi-lbl, .fi-warn').forEach(e => {
    e.style.display = on ? '' : 'none';
  });
}

// ── SAVE / LOAD ───────────────────────────────────────────────────────
// v1: localStorage — swap these two functions for Supabase
function saveRaw(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function loadRaw() {
  const r = localStorage.getItem(STORAGE_KEY);
  return r ? JSON.parse(r) : null;
}

function saveLayout() {
  saveRaw({ unit:S.unit, labels:S.labels, items:S.items, seq:S.seq, ts:Date.now() });
  const t = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  document.getElementById('sb-save').textContent = 'saved ' + t;
  showToast('Layout saved');
}

function loadLayout() {
  const d = loadRaw();
  if (!d) { showToast('No saved layout found'); return; }
  S.unit   = d.unit   || '10x15';
  S.labels = d.labels !== undefined ? d.labels : true;
  S.items  = d.items  || [];
  S.seq    = d.seq    || S.items.length + 1;
  document.getElementById('btn-1015').classList.toggle('active', S.unit === '10x15');
  document.getElementById('btn-1020').classList.toggle('active', S.unit === '10x20');
  document.getElementById('btn-lon').classList.toggle('active',  S.labels);
  document.getElementById('btn-loff').classList.toggle('active', !S.labels);
  renderRoom();
  const ts = d.ts ? new Date(d.ts).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }) : '';
  document.getElementById('sb-save').textContent = 'loaded · saved ' + ts;
  showToast('Layout loaded');
}

function clearLayout() {
  if (!confirm('Clear all items from canvas?')) return;
  S.items = []; S.seq = 1;
  renderRoom();
  markUnsaved();
  showToast('Canvas cleared');
}

// ── STATUS ────────────────────────────────────────────────────────────
function updateStatus() {
  const n = S.items.length;
  document.getElementById('sb-items').textContent = n + ' item' + (n !== 1 ? 's' : '') + ' placed';
}

function markUnsaved() {
  document.getElementById('sb-save').textContent = 'unsaved';
}

// ── TOAST ─────────────────────────────────────────────────────────────
let _tt;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2200);
}
</script>
</body>
</html>
