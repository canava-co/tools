<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANAVA — Editorial</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f4f1ec;--card:#ffffff;--navy:#363675;--blue:#3885E3;
  --ink:#1A1A2E;--muted:#7a7a8a;--red:#880808;--green:#2a5e3e;--amber:#7a4a00;
  --br:rgba(54,54,117,0.13);--brs:rgba(54,54,117,0.22);
  --f:'DM Sans',Helvetica,sans-serif;--fs:'EB Garamond',Georgia,serif;
}
html,body{background:var(--bg);color:var(--ink);font-family:var(--f);min-height:100vh;font-size:15px;-webkit-text-size-adjust:100%;}

/* ── HEADER ── */
.hdr{background:var(--bg);border-bottom:0.5px solid var(--brs);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:50;}
.hdr-logo{height:20px;width:auto;display:block;}
.hdr-date{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}

/* ── SUMMARY ── */
.summary{display:flex;border-bottom:0.5px solid var(--br);background:var(--bg);}
.sc{flex:1;padding:16px 14px 14px;border-right:0.5px solid var(--br);text-align:center;cursor:pointer;transition:background .12s;}
.sc:last-child{border-right:none;}
.sc:hover{background:rgba(54,54,117,0.04);}
.sn{font-family:var(--fs);font-size:32px;color:var(--navy);line-height:1;}
.sl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:4px;}

/* ── QUICK ADD ── */
.add-outer{padding:18px 28px 16px;border-bottom:0.5px solid var(--brs);background:var(--bg);}
.add-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);margin-bottom:10px;}
textarea#a-title{font-family:var(--fs);font-size:20px;font-style:italic;color:var(--navy);background:transparent;border:none;outline:none;resize:none;width:100%;line-height:1.3;min-height:26px;padding:0;display:block;}
textarea#a-title::placeholder{color:var(--muted);opacity:.4;}

/* desktop add fields */
.add-fields{display:flex;flex-direction:column;margin-top:12px;border-top:0.5px solid var(--br);}
.add-row{display:flex;align-items:flex-start;padding:10px 0 0;}
.add-row+.add-row{border-top:0.5px solid var(--br);padding-bottom:2px;}
.af{display:flex;flex-direction:column;gap:4px;padding:0 14px 0 0;flex-shrink:0;}
.af+.af{padding-left:14px;border-left:0.5px solid var(--br);}
.af.concept-f{flex:1;min-width:80px;}
.af.type-f,.af.cat-f,.af.subcat-f{flex:0 0 118px;}
.af.pri-f{flex:0 0 88px;}
.af.date-f{flex:0 0 128px;}
.af.by-f{flex:0 0 115px;}
.af.spark-f{flex:0 0 130px;}
.af.url-f{flex:0 0 148px;}
.af.tags-f{flex:0 0 140px;}
.af.refurl-f{flex:0 0 155px;}
.af.act-f{flex:0 0 auto;padding-right:0;align-items:flex-end;padding-top:2px;gap:7px;}
.af label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.af input,.af select,.af textarea{font-family:var(--f);font-size:12px;color:var(--navy);background:transparent;border:none;outline:none;-webkit-appearance:none;appearance:none;padding:0;width:100%;}
.af input[type="date"]{-webkit-appearance:auto;appearance:auto;}
.af input::placeholder,.af textarea::placeholder{color:var(--muted);opacity:.45;}
.af select option{background:var(--bg);color:var(--navy);}
.af textarea{resize:none;min-height:30px;font-style:italic;}
.add-st{font-size:10px;font-style:italic;color:var(--muted);min-height:16px;margin-top:7px;}
.add-st.ok{color:var(--green);}.add-st.err{color:var(--red);}

/* ── BUTTONS ── */
.btn{font-family:var(--f);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--navy);background:transparent;border:0.5px solid var(--brs);border-radius:1px;padding:8px 16px;cursor:pointer;transition:background .13s,color .13s;white-space:nowrap;line-height:1;display:inline-flex;align-items:center;gap:4px;flex-shrink:0;}
.btn:hover{background:var(--navy);color:var(--bg);}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn.blue{color:var(--blue);border-color:var(--blue);}.btn.blue:hover{background:var(--blue);color:var(--bg);}
.btn.ghost{color:var(--muted);border-color:rgba(54,54,117,.18);}.btn.ghost:hover{border-color:var(--muted);color:var(--navy);}
.btn.danger{color:var(--red);border-color:rgba(136,8,8,.3);}.btn.danger:hover{background:var(--red);color:white;}
.btn.sm{font-size:9px;padding:7px 13px;}

/* ── CONTROLS ── */
.ctrl-outer{border-top:0.5px solid var(--br);border-bottom:0.5px solid var(--br);background:var(--bg);position:sticky;top:58px;z-index:40;}
.ctrl-tabs{display:flex;align-items:stretch;border-bottom:0.5px solid var(--br);min-height:42px;}
.c-tab{font-family:var(--f);font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 20px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;transition:all .14s;white-space:nowrap;display:flex;align-items:center;gap:6px;margin-bottom:-0.5px;}
.c-tab:first-child{padding-left:28px;}
.c-tab.on{color:var(--navy);border-bottom-color:var(--navy);}
.c-tab:hover:not(.on){color:var(--navy);opacity:.7;}
.tab-n{font-size:9px;font-weight:normal;opacity:.55;}
.ctrl-filters{display:flex;align-items:center;min-height:38px;overflow-x:auto;}
.c-select{font-family:var(--f);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);background:transparent;border:none;border-right:0.5px solid var(--br);outline:none;padding:0 14px;cursor:pointer;-webkit-appearance:none;appearance:none;height:38px;flex-shrink:0;}
.c-select:hover{color:var(--blue);}.c-select option{background:var(--bg);color:var(--navy);}
.c-search{font-family:var(--f);font-size:12px;color:var(--navy);background:transparent;border:none;border-left:0.5px solid var(--br);outline:none;padding:0 18px;width:200px;height:38px;flex-shrink:0;}
.c-search::placeholder{color:var(--navy);opacity:.28;}

/* ── LIST ── */
.list-wrap{padding:0 28px 80px;}
.empty{padding:80px 0;text-align:center;}
.empty-t{font-family:var(--fs);font-size:26px;font-style:italic;color:var(--muted);opacity:.35;margin-bottom:10px;}
.empty-s{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);opacity:.3;}

/* ── ITEM ROW ── */
.item{display:grid;grid-template-columns:4px 1fr auto;gap:0 22px;align-items:start;padding:18px 0;border-bottom:0.5px solid var(--br);animation:up .15s ease both;}
@keyframes up{from{opacity:0;transform:translateY(2px);}to{opacity:1;transform:none;}}
.pip{width:4px;border-radius:0;margin-top:7px;flex-shrink:0;}
.pip.urgent{background:var(--red);height:46px;}.pip.high{background:#7a3a00;height:32px;}
.pip.medium{background:var(--navy);height:20px;}.pip.low{background:var(--muted);height:12px;opacity:.5;}
.pip.someday{background:var(--muted);height:6px;opacity:.25;}
.pip-idea{opacity:.5;}.pip-developing{opacity:.9;}.pip-review{opacity:.8;}
.pip-ready{opacity:1;}.pip-published{opacity:1;}.pip-hold{opacity:.35;}.pip-killed{opacity:.2;}
.ibody{min-width:0;}
.ititle{font-family:var(--fs);font-size:20px;font-style:italic;color:var(--navy);line-height:1.3;margin-bottom:6px;}
.imeta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:5px;}
.status-badge{font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border:0.5px solid;}
.st-idea{color:#5a4a00;border-color:rgba(90,74,0,.22);background:rgba(244,238,0,.05);}
.st-developing{color:var(--blue);border-color:rgba(56,133,227,.22);background:rgba(56,133,227,.04);}
.st-review{color:#5a2e00;border-color:rgba(90,46,0,.22);background:rgba(200,100,0,.04);}
.st-ready{color:var(--green);border-color:rgba(42,94,62,.22);background:rgba(42,94,62,.04);}
.st-published{color:var(--navy);border-color:rgba(54,54,117,.2);background:rgba(54,54,117,.04);}
.st-hold{color:var(--muted);border-color:rgba(137,139,143,.22);background:transparent;}
.st-in-work{color:#4a2a7a;border-color:rgba(74,42,122,.28);background:rgba(74,42,122,.05);}
.st-needs-audit{color:#7a4a00;border-color:rgba(122,74,0,.28);background:rgba(255,165,0,.06);}
.st-audited{color:var(--green);border-color:rgba(42,94,62,.28);background:rgba(42,94,62,.06);}
.st-killed{color:var(--red);border-color:rgba(136,8,8,.18);background:transparent;opacity:.5;}
.itype{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--navy);color:var(--navy);background:rgba(54,54,117,.06);font-weight:500;}
.icat{font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--brs);color:var(--navy);background:rgba(54,54,117,.04);}
.isubcat{font-size:9px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);padding:3px 6px;border:0.5px solid var(--br);}
.idate{font-size:10px;color:var(--muted);}
.idate.soon{color:var(--amber);font-weight:500;}.idate.overdue{color:var(--red);font-weight:500;}
.iby{font-size:10px;color:var(--muted);font-style:italic;}
.iconcept{font-size:13px;font-style:italic;color:var(--muted);margin-top:4px;line-height:1.45;}
.ispark{font-size:10px;color:var(--muted);opacity:.6;margin-top:4px;}.ispark span{color:var(--blue);opacity:.9;}
.ilinks{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;align-items:center;}
.ilink{display:inline-flex;align-items:center;gap:3px;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);text-decoration:none;opacity:.7;border:0.5px solid rgba(56,133,227,.22);padding:3px 8px;}
.ilink:hover{opacity:1;background:rgba(56,133,227,.05);}
.chat-list{display:flex;flex-direction:column;gap:7px;margin-bottom:8px;}
.chat-row{display:flex;align-items:center;gap:8px;}
.chat-row input{flex:1;font-family:var(--f);font-size:13px;padding:7px 10px;border:0.5px solid var(--brs);background:var(--card);color:var(--ink);outline:none;border-radius:1px;}
.chat-row input:focus{border-color:var(--navy);}
.chat-row-label{font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap;min-width:44px;}
.chat-rm{background:none;border:0.5px solid rgba(136,8,8,.3);color:var(--red);font-size:13px;width:24px;height:24px;cursor:pointer;border-radius:1px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;}
.itags{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.itag{font-size:9px;letter-spacing:.07em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--brs);color:var(--navy);background:rgba(54,54,117,.04);font-weight:500;}
.iassets{font-size:10px;color:var(--muted);margin-top:4px;font-style:italic;opacity:.65;}
.ithumb-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.ithumb{width:56px;height:56px;object-fit:cover;border:0.5px solid var(--br);cursor:pointer;}
.iacts{display:flex;flex-direction:column;gap:5px;align-items:flex-end;padding-top:2px;flex-shrink:0;}

#global-st{font-size:10px;font-style:italic;color:var(--green);padding:6px 28px;min-height:22px;background:var(--bg);}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(26,26,46,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;}
.modal{background:var(--bg);width:100%;max-width:600px;max-height:92vh;overflow-y:auto;border:0.5px solid var(--brs);}
.mhd{padding:16px 24px 13px;border-bottom:0.5px solid var(--br);display:flex;align-items:baseline;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;}
.mhd-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--blue);}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:0;line-height:1;}
.mbody{padding:18px 24px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.fg input,.fg select,.fg textarea{width:100%;font-family:var(--f);font-size:14px;padding:8px 10px;border:0.5px solid var(--brs);background:var(--card);color:var(--ink);outline:none;border-radius:1px;}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--navy);}
.fg textarea{resize:vertical;min-height:56px;}
.fg.title-fg input{font-family:var(--fs);font-size:18px;font-style:italic;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.msec{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding-bottom:9px;border-bottom:0.5px solid var(--br);margin:6px 0 14px;}
.mft{padding:14px 24px;border-top:0.5px solid var(--br);display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;background:var(--bg);}
.mft-r{display:flex;gap:9px;}

/* ── IMAGE UPLOAD ── */
.img-zone{border:0.5px dashed var(--brs);padding:16px;text-align:center;cursor:pointer;transition:background .13s;margin-bottom:8px;}
.img-zone:hover{background:rgba(54,54,117,.03);}
.img-zone input{display:none;}
.img-zone-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.img-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.img-item{position:relative;width:72px;height:72px;}
.img-item img{width:100%;height:100%;object-fit:cover;border:0.5px solid var(--br);}
.img-rm{position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:var(--red);color:white;border:none;border-radius:50%;font-size:11px;line-height:16px;text-align:center;cursor:pointer;padding:0;}
.img-uploading{width:72px;height:72px;border:0.5px solid var(--br);display:flex;align-items:center;justify-content:center;background:rgba(54,54,117,.03);}

/* ── SPINNER ── */
.spin{display:inline-block;width:9px;height:9px;border:1.5px solid var(--br);border-top-color:var(--blue);border-radius:50%;animation:ro .7s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes ro{to{transform:rotate(360deg);}}

/* ── LIGHTBOX ── */
.lbox{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;z-index:300;cursor:pointer;}
.lbox img{max-width:90vw;max-height:90vh;object-fit:contain;}

/* ── MOBILE ── */
@media(max-width:768px){
  .hdr{padding:0 16px;height:52px;}.hdr-logo{height:17px;}
  .hdr-date{display:none;}
  .summary{flex-wrap:wrap;}
  .sc{flex:1 0 50%;border-bottom:0.5px solid var(--br);padding:12px 10px;}
  .sc:nth-child(2){border-right:none;}
  .sn{font-size:28px;}.sl{font-size:8px;}

  .add-outer{padding:14px 16px 12px;}
  textarea#a-title{font-size:18px;}
  .add-fields{flex-direction:column;}
  .add-row{flex-direction:column;padding-bottom:0;}
  .add-row+.add-row{border-top:0.5px solid var(--br);}
  .af{flex:none!important;width:100%!important;padding:11px 0!important;border-left:none!important;border-bottom:0.5px solid var(--br);}
  .af label{font-size:10px;}
  .af input,.af select,.af textarea{font-size:14px;}
  .af:last-child{border-bottom:none;}
  .af.act-f{flex-direction:row!important;justify-content:flex-end;gap:9px;padding-top:12px!important;}

  .ctrl-outer{top:52px;}
  .c-tab:first-child{padding-left:16px;}.c-tab{padding:0 14px;}
  .ctrl-filters{display:grid;grid-template-columns:1fr 1fr;}
  .c-select{border:none;border-bottom:0.5px solid var(--br);border-right:0.5px solid var(--br);padding:11px 13px;height:auto;width:100%;font-size:10px;}
  .c-select:nth-child(even){border-right:none;}
  .c-search{grid-column:1/-1;width:100%;border:none;border-top:0.5px solid var(--br);padding:11px 14px;height:auto;font-size:13px;}

  .list-wrap{padding:0 16px 80px;}
  .item{grid-template-columns:4px 1fr;padding:15px 0;}
  .pip{grid-row:1/3;}
  .iacts{grid-column:2;flex-direction:row;flex-wrap:wrap;justify-content:flex-start;padding-top:9px;gap:6px;}
  .ititle{font-size:18px;}
  .imeta{gap:8px;}
  .iconcept{font-size:13px;}

  .r2,.r3{grid-template-columns:1fr;}
  .modal{max-width:100%;max-height:96vh;}
  .mhd,.mbody,.mft{padding-left:16px;padding-right:16px;}
  .fg input,.fg select,.fg textarea{font-size:15px;padding:10px;}
}
/* ── PROJECT VIEW ── */
.pv-ov{position:fixed;inset:0;background:rgba(26,26,46,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.pv{background:var(--bg);width:100%;max-width:720px;max-height:92vh;overflow-y:auto;border:0.5px solid var(--brs);}
.pv-hd{padding:18px 28px 14px;border-bottom:0.5px solid var(--br);display:flex;align-items:flex-start;justify-content:space-between;gap:16px;position:sticky;top:0;background:var(--bg);z-index:10;}
.pv-title{font-family:var(--fs);font-size:26px;font-style:italic;color:var(--navy);line-height:1.25;flex:1;}
.pv-hd-r{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-top:4px;}
.pv-body{padding:20px 28px 24px;display:grid;grid-template-columns:1fr 1fr;gap:0 40px;}
.pv-full{grid-column:1/-1;}
.pv-sect{margin-bottom:20px;}
.pv-sect-label{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--br);}
.pv-field{margin-bottom:12px;}
.pv-fl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;}
.pv-fv{font-size:14px;color:var(--ink);line-height:1.5;}
.pv-fv.italic{font-family:var(--fs);font-style:italic;font-size:15px;}
.pv-fv a{color:var(--blue);text-decoration:none;}.pv-fv a:hover{text-decoration:underline;}
.pv-chips{display:flex;gap:6px;flex-wrap:wrap;}
.pv-img-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
.pv-img{width:90px;height:90px;object-fit:cover;border:0.5px solid var(--br);cursor:pointer;}
@media(max-width:768px){
  .pv-ov{padding:0;align-items:flex-end;}
  .pv{max-width:100%;max-height:96vh;border-left:none;border-right:none;border-bottom:none;}
  .pv-body{grid-template-columns:1fr;gap:0;}
  .pv-hd,.pv-body{padding-left:16px;padding-right:16px;}
}
</style>
</head>
<body>

<div class="hdr">
  <img class="hdr-logo" src="NO_BORDER.png" alt="CANAVA"/>
  <div class="hdr-date" id="hdr-date"></div>
</div>

<div class="summary">
  <div class="sc" onclick="filterByStatus('idea')"><div class="sn" id="s-ideas">—</div><div class="sl">Ideas</div></div>
  <div class="sc" onclick="filterByStatus('developing')"><div class="sn" id="s-dev">—</div><div class="sl">In Progress</div></div>
  <div class="sc" onclick="filterByStatus('ready')"><div class="sn" id="s-ready">—</div><div class="sl">Ready</div></div>
  <div class="sc"><div class="sn" id="s-pub">—</div><div class="sl">Published</div></div>
</div>

<div class="add-outer">
  <div class="add-label">New Idea or Project</div>
  <textarea id="a-title" rows="1" placeholder="Title or working headline..."></textarea>
  <div class="add-fields">
    <div class="add-row">
      <div class="af concept-f"><label>Concept / Angle</label><textarea id="a-concept" rows="2" placeholder="The hook, angle, or brief..."></textarea></div>
      <div class="af type-f"><label>What It Is</label>
        <select id="a-type">
          <option value="idea">Idea</option><option value="feature">Feature</option>
          <option value="quick">Quick</option><option value="social">Social</option>
          <option value="brand-review">Brand Review</option><option value="recipe">Recipe</option>
          <option value="ff">FF — Founder Finds</option>
          <option value="tool">Tool</option><option value="media">Media</option>
        </select>
      </div>
      <div class="af cat-f"><label>What It's For</label>
        <select id="a-cat" onchange="updateSubCatLabel('a-subcat-label',this.value)">
          <option value="">—</option><option value="travel">Travel</option>
          <option value="food">Food</option><option value="home-design">Home Design</option>

<script>
const SURL='https://miokgyffvhhylsfmsmmb.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1pb2tneWZmdmhoeWxzZm1zbW1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjUxOTMsImV4cCI6MjA4ODc0MTE5M30.D10ZE_U4sCoG3_G2XyvVUxa-2UNilLFMDkRrqw55C7s';

const SUBCAT_HINTS={travel:'e.g. Hotel, Destination, Itinerary',food:'e.g. Ingredient, Recipe Type, Occasion',style:'e.g. Brand, Category, Season','home-design':'e.g. Room, Material, Style',wellbeing:'e.g. Practice, Product, Modality',tech:'e.g. App, Platform, Category','media-diet':'e.g. Platform, Format, Genre',housekeeping:'e.g. Room, Product, System',move:'e.g. Workout, Discipline',pet:'e.g. Species, Product'};

document.addEventListener('DOMContentLoaded',()=>{
  setDate();
  const ta=document.getElementById('a-title');
  ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});

});

function setDate(){
  const d=new Date(),days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
  months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('hdr-date').textContent=days[d.getDay()]+' · '+months[d.getMonth()]+' '+d.getDate()+' · '+d.getFullYear();
}

function updateSubCatLabel(labelId,catVal){
  const el=document.getElementById(labelId);
  if(!el)return;
  el.textContent=SUBCAT_HINTS[catVal]||'Sub-category';
}

function hd(ex={}){return{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json',...ex};}
async function api(path,method,body){
  const opts={method:method||'GET',headers:hd(method==='POST'?{'Prefer':'return=representation'}:{})};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(SURL+'/rest/v1/'+path,opts);
  if(!r.ok){const e=await r.text();throw new Error(e);}
  if(r.status===204)return null;return r.json();
}

async function loadItems(){
  setGSt('<span class="spin"></span>Loading...');
  try{
    allItems=await api(TABLE+'?order=created_at.desc&select=*')||[];
    updateSummary();render();setGSt('');
  }catch(e){
    setGSt('');
    document.getElementById('list').innerHTML='<div class="empty"><div class="empty-t" style="color:var(--red);opacity:1;">Error: '+esc(e.message)+'</div></div>';
  }
}

function getTab(tab){
  if(tab==='pipeline')return allItems.filter(i=>['idea','developing','review','in-work','ready','needs-audit','audited','hold'].includes(i.status));
  if(tab==='published')return allItems.filter(i=>i.status==='published');
  if(tab==='archive')return allItems.filter(i=>i.status==='killed');
  return allItems;
}

function render(){
  const sort=v2('c-sort'),sf=v2('c-status'),tf=v2('c-type'),cf=v2('c-cat'),pf=v2('c-pri'),srch=v2('c-srch').toLowerCase();
  let items=getTab(currentTab);
  if(sf)items=items.filter(i=>i.status===sf);
  if(tf)items=items.filter(i=>i.content_type===tf);
  if(cf)items=items.filter(i=>i.category===cf);
  if(pf)items=items.filter(i=>i.priority===pf);
  if(srch)items=items.filter(i=>(i.title||'').toLowerCase().includes(srch)||(i.concept||'').toLowerCase().includes(srch)||(i.spark_source||'').toLowerCase().includes(srch)||(i.notes||'').toLowerCase().includes(srch)||(i.tags||'').toLowerCase().includes(srch)||(i.category||'').toLowerCase().includes(srch)||(i.sub_category||'').toLowerCase().includes(srch)||(i.initiated_by||'').toLowerCase().includes(srch));
  items.sort((a,b)=>{
    if(sort==='target'){if(!a.target_date&&!b.target_date)return 0;if(!a.target_date)return 1;if(!b.target_date)return -1;return a.target_date.localeCompare(b.target_date);}
    if(sort==='priority')return(PO[a.priority]??2)-(PO[b.priority]??2);
    if(sort==='status')return(SO[a.status]??9)-(SO[b.status]??9);
    if(sort==='type')return(a.content_type||'').localeCompare(b.content_type||'');
    if(sort==='cat')return(a.category||'').localeCompare(b.category||'');
    if(sort==='new')return new Date(b.created_at)-new Date(a.created_at);
    if(sort==='alpha')return(a.title||'').localeCompare(b.title||'');
    return 0;
  });
  updateTabCounts();
  const list=document.getElementById('list');
  if(!items.length){list.innerHTML='<div class="empty"><div class="empty-t">Nothing here yet.</div><div class="empty-s">Add an idea above to start the pipeline.</div></div>';return;}
  list.innerHTML=items.map(ri).join('');
}

function ri(i){
  const stCls='st-'+(i.status||'idea');
  const tl=TL[i.content_type]||i.content_type||'';
  const cl=CL[i.category]||'';
  let dh='';
  if(i.target_date){
    const today=new Date();today.setHours(0,0,0,0);
    const td=new Date(i.target_date+'T00:00:00'),diff=Math.round((td-today)/86400000);
    let cls='idate';
    if(diff<0&&i.status!=='published')cls='idate overdue';
    else if(diff>=0&&diff<=7&&i.status!=='published')cls='idate soon';
    dh=`<span class="${cls}">→ ${fmtDate(i.target_date)}</span>`;
  }
  const tags=(i.tags||'').split(',').map(t=>t.trim()).filter(Boolean);
  const hasL=parseChatUrls(i.chat_url).length||parseRefUrls(i.reference_urls).length||i.dropbox_url||i.figma_url;
  const chatUrls=parseChatUrls(i.chat_url);
  const refUrls=parseRefUrls(i.reference_urls);
  const imgs=parseImgs(i.images);
  return `<div class="item"><div class="pip ${i.priority||'medium'} pip-${i.status||'idea'}"></div><div class="ibody">
    <div class="ititle" onclick="openPV('${i.id}')" style="cursor:pointer;" title="View project">${esc(i.title||'Untitled')}</div>
    <div class="imeta">
      <span class="status-badge ${stCls}">${SL[i.status]||i.status}</span>
      ${tl?`<span class="itype">${tl}</span>`:''}
      ${cl?`<span class="icat">${cl}</span>`:''}
      ${i.sub_category?`<span class="isubcat">· ${esc(i.sub_category)}</span>`:''}
      ${dh}
      ${i.initiated_by?`<span class="iby">${esc(i.initiated_by)}</span>`:''}
    </div>
    ${i.concept?`<div class="iconcept">${esc(i.concept)}</div>`:''}
    ${i.spark_source?`<div class="ispark">Sparked by: <span>${esc(i.spark_source)}</span></div>`:''}
    ${hasL?`<div class="ilinks">${chatUrls.map((url,idx)=>`<a class="ilink" href="${esc(url)}" target="_blank" rel="noopener">↗ Chat${chatUrls.length>1?' '+(idx+1):''}</a>`).join('')} ${refUrls.map((url,idx)=>`<a class="ilink" href="${esc(url)}" target="_blank" rel="noopener">⤷ Ref${refUrls.length>1?' '+(idx+1):''}</a>`).join('')} ${i.dropbox_url?`<a class="ilink" href="${esc(i.dropbox_url)}" target="_blank" rel="noopener">⬡ Dropbox</a>`:''} ${i.figma_url?`<a class="ilink" href="${esc(i.figma_url)}" target="_blank" rel="noopener">◈ Figma</a>`:''}</div>`:''}
    ${i.assets_note?`<div class="iassets">${esc(i.assets_note)}</div>`:''}
    ${imgs.length?`<div class="ithumb-row">${imgs.map(url=>`<img class="ithumb" src="${esc(url)}" onclick="openLightbox('${esc(url)}')" alt=""/>`).join('')}</div>`:''}
    ${tags.length?`<div class="itags">${tags.map(t=>`<span class="itag">${esc(t)}</span>`).join('')}</div>`:''}
  </div><div class="iacts"><button class="btn ghost sm" style="font-size:9px;padding:7px 12px" onclick="openPV('${i.id}')">View</button><button class="btn ghost sm" style="font-size:9px;padding:7px 12px" onclick="openEdit('${i.id}')">Edit</button></div></div>`;
}

function updateSummary(){
  document.getElementById('s-ideas').textContent=allItems.filter(i=>i.status==='idea').length;
  document.getElementById('s-dev').textContent=allItems.filter(i=>['developing','review'].includes(i.status)).length;
  document.getElementById('s-ready').textContent=allItems.filter(i=>i.status==='ready').length;
  document.getElementById('s-pub').textContent=allItems.filter(i=>i.status==='published').length;
}

function updateTabCounts(){
  document.getElementById('n-pipeline').textContent=getTab('pipeline').length;
  document.getElementById('n-published').textContent=getTab('published').length;
  document.getElementById('n-archive').textContent=getTab('archive').length;
}

async function doAdd(){
  const title=document.getElementById('a-title').value.trim();
  if(!title){setAddSt('Title is required.','err');return;}
  const btn=document.getElementById('add-btn');btn.disabled=true;setAddSt('<span class="spin"></span>Saving...','');
  try{
    const p={title,concept:v('a-concept'),content_type:v('a-type'),category:v('a-cat')||null,sub_category:v('a-subcat')||null,priority:v('a-pri'),target_date:v('a-date')||null,initiated_by:v('a-by')||null,spark_source:v('a-spark')||null,tags:v('a-tags')||null,reference_urls:(()=>{const u=v('a-refurl');return u?JSON.stringify([u]):null;})(),chat_url:v('a-url')||null,status:'idea',updated_at:new Date().toISOString()};
    const res=await api(TABLE,'POST',p);
    const cr=Array.isArray(res)?res[0]:res;
    if(cr)allItems.unshift(cr);
    clearAdd();updateSummary();render();setAddSt('Added — '+title,'ok');setTimeout(()=>setAddSt('',''),3000);
  }catch(e){setAddSt('Error: '+e.message,'err');}
  btn.disabled=false;
}

function clearAdd(){
  ['a-title','a-concept','a-spark','a-url','a-by','a-subcat','a-tags','a-refurl'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('a-date').value='';document.getElementById('a-type').value='idea';
  document.getElementById('a-pri').value='medium';document.getElementById('a-cat').value='';
  document.getElementById('a-title').style.height='auto';setAddSt('','');
}

/* ── IMAGE HANDLING ── */
function parseImgs(raw){
  if(!raw)return[];
  try{return JSON.parse(raw);}catch(e){return[];}
}
function parseChatUrls(raw){
  if(!raw)return[];
  if(raw.trim().startsWith('['))try{return JSON.parse(raw).filter(Boolean);}catch(e){}
  return raw.trim()?[raw.trim()]:[];
}
function parseRefUrls(raw){
  if(!raw)return[];
  if(raw.trim().startsWith('['))try{return JSON.parse(raw).filter(Boolean);}catch(e){}
  return raw.trim()?[raw.trim()]:[];
}
function renderChatList(){
  const list=document.getElementById('chat-list');
  if(!list)return;
  list.innerHTML=editingChats.map((url,idx)=>`
    <div class="chat-row">
      <span class="chat-row-label">Chat ${idx+1}</span>
      <input type="url" value="${esc(url)}" placeholder="https://claude.ai/chat/..." oninput="editingChats[${idx}]=this.value"/>
      <button class="chat-rm" onclick="removeChatRow(${idx})" title="Remove">×</button>
    </div>`).join('');
}
function addChatRow(){editingChats.push('');renderChatList();}
function removeChatRow(idx){editingChats.splice(idx,1);renderChatList();}
function renderRefUrlList(){
  const list=document.getElementById('ref-url-list');
  if(!list)return;
  list.innerHTML=editingRefUrls.map((url,idx)=>`
    <div class="chat-row">
      <span class="chat-row-label">URL ${idx+1}</span>
      <input type="url" value="${esc(url)}" placeholder="https://..." oninput="editingRefUrls[${idx}]=this.value"/>
      <button class="chat-rm" onclick="removeRefUrlRow(${idx})" title="Remove">×</button>
    </div>`).join('');
}
function addRefUrlRow(){editingRefUrls.push('');renderRefUrlList();}
function removeRefUrlRow(idx){editingRefUrls.splice(idx,1);renderRefUrlList();}

function renderImgGrid(){
  const grid=document.getElementById('img-grid');
  if(!grid)return;
  grid.innerHTML=editingImages.map((url,idx)=>`
    <div class="img-item">
      <img src="${esc(url)}" onclick="openLightbox('${esc(url)}')" alt=""/>
      <button class="img-rm" onclick="removeImg(${idx})" title="Remove">×</button>
    </div>`).join('');
}

function removeImg(idx){
  editingImages.splice(idx,1);
  renderImgGrid();
}

async function handleImgUpload(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  const st=document.getElementById('img-st');
  st.innerHTML='<span class="spin"></span>Uploading...';
  for(const file of files){
    try{
      const ext=file.name.split('.').pop();
      const path=`editorial/${editingId||'draft'}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;
      const r=await fetch(`${SURL}/storage/v1/object/${BUCKET}/${path}`,{
        method:'POST',
        headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':file.type,'x-upsert':'true'},
        body:file
      });
      if(!r.ok)throw new Error(await r.text());
      const url=`${SURL}/storage/v1/object/public/${BUCKET}/${path}`;
      editingImages.push(url);
      renderImgGrid();
    }catch(e){st.innerHTML='Upload error: '+e.message;return;}
  }
  st.innerHTML='';
  input.value='';
}

function openLightbox(url){
  document.getElementById('lbox-img').src=url;
  document.getElementById('lbox').style.display='flex';
}

/* ── EDIT / SAVE ── */
function openEdit(id){
  const i=allItems.find(x=>x.id===id);if(!i)return;
  editingId=id;editingImages=parseImgs(i.images);
  sv('e-title',i.title||'');sv('e-concept',i.concept||'');sv('e-status',i.status||'idea');
  sv('e-type',i.content_type||'idea');sv('e-cat',i.category||'');sv('e-subcat',i.sub_category||'');
  sv('e-pri',i.priority||'medium');sv('e-tags',i.tags||'');sv('e-date',i.target_date||'');
  sv('e-pub',i.published_date||'');sv('e-by',i.initiated_by||'');
  sv('e-spark',i.spark_source||'');sv('e-notes',i.notes||'');
  editingChats=parseChatUrls(i.chat_url);
  if(editingChats.length===0)editingChats=[''];
  renderChatList();
  editingRefUrls=parseRefUrls(i.reference_urls);
  if(editingRefUrls.length===0)editingRefUrls=[''];
  renderRefUrlList();
  sv('e-dropbox',i.dropbox_url||'');sv('e-figma',i.figma_url||'');sv('e-assets',i.assets_note||'');
  updateSubCatLabel('e-subcat-label',i.category||'');
  renderImgGrid();
  document.getElementById('modal-ov').style.display='flex';
  document.body.style.overflow='hidden';
}

function closeModal(){document.getElementById('modal-ov').style.display='none';document.body.style.overflow='';editingId=null;editingImages=[];editingChats=[];editingRefUrls=[];}

async function doSave(){
  if(!editingId)return;
  const btn=document.getElementById('save-btn');btn.disabled=true;btn.textContent='Saving...';
  try{
    const p={title:v('e-title'),concept:v('e-concept')||null,status:v('e-status'),content_type:v('e-type'),category:v('e-cat')||null,sub_category:v('e-subcat')||null,priority:v('e-pri'),tags:v('e-tags')||null,target_date:v('e-date')||null,published_date:v('e-pub')||null,initiated_by:v('e-by')||null,spark_source:v('e-spark')||null,chat_url:(()=>{const urls=editingChats.map(u=>u.trim()).filter(Boolean);return urls.length?JSON.stringify(urls):null;})(),reference_urls:(()=>{const urls=editingRefUrls.map(u=>u.trim()).filter(Boolean);return urls.length?JSON.stringify(urls):null;})(),notes:v('e-notes')||null,dropbox_url:v('e-dropbox')||null,figma_url:v('e-figma')||null,assets_note:v('e-assets')||null,images:editingImages.length?JSON.stringify(editingImages):null,updated_at:new Date().toISOString()};
    await api(TABLE+'?id=eq.'+editingId,'PATCH',p);
    const idx=allItems.findIndex(x=>x.id===editingId);
    if(idx>-1)allItems[idx]={...allItems[idx],...p};
    updateSummary();render();closeModal();setGSt('Saved.');setTimeout(()=>setGSt(''),2500);
  }catch(e){setGSt('Error: '+e.message);}
  btn.disabled=false;btn.textContent='Save';
}

function triggerDelete(){if(!editingId)return;const i=allItems.find(x=>x.id===editingId);document.getElementById('del-title-preview').textContent=i?i.title:'';document.getElementById('del-ov').style.display='flex';}
function closeDelModal(){document.getElementById('del-ov').style.display='none';}
async function doDelete(){
  if(!editingId)return;const btn=document.getElementById('del-confirm-btn');btn.disabled=true;
  try{
    await api(TABLE+'?id=eq.'+editingId,'DELETE');
    allItems=allItems.filter(x=>x.id!==editingId);updateSummary();render();closeDelModal();closeModal();setGSt('Deleted.');setTimeout(()=>setGSt(''),2500);
  }catch(e){setGSt('Error: '+e.message);}
  btn.disabled=false;
}

function setTab(tab,el){currentTab=tab;document.querySelectorAll('.c-tab').forEach(t=>t.classList.remove('on'));if(el)el.classList.add('on');document.getElementById('c-status').value='';render();}
function filterByStatus(s){setTab('pipeline',document.querySelector('.c-tab'));document.getElementById('c-status').value=s;render();}
function v(id){return(document.getElementById(id)?.value||'').trim();}
function v2(id){return document.getElementById(id)?.value||'';}
function sv(id,val){const el=document.getElementById(id);if(el)el.value=val;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setAddSt(msg,cls){const el=document.getElementById('add-st');el.innerHTML=msg;el.className='add-st'+(cls?' '+cls:'');}
function setGSt(msg){document.getElementById('global-st').innerHTML=msg;}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-'),months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return months[parseInt(m)-1]+' '+parseInt(day)+', '+y;}

let pvId=null;
function openPV(id){
  const i=allItems.find(x=>x.id===id);if(!i)return;
  pvId=id;
  document.getElementById('pv-title').textContent=i.title||'Untitled';
  const stLabel=SL[i.status]||i.status;
  const stCls='st-'+(i.status||'idea');
  const tl=TL[i.content_type]||i.content_type||'';
  const cl=CL[i.category]||'';
  const priLabel={urgent:'Urgent',high:'High',medium:'Medium',low:'Low',someday:'Someday'}[i.priority]||i.priority||'';
  const chatUrls=parseChatUrls(i.chat_url);
  const refUrls=parseRefUrls(i.reference_urls);
  const imgs=parseImgs(i.images);
  const tags=(i.tags||'').split(',').map(t=>t.trim()).filter(Boolean);

  let html='';

  // Row 1: status/classification left, dates right
  html+=`<div class="pv-sect pv-full" style="margin-bottom:14px;">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
      <span class="status-badge ${stCls}">${stLabel}</span>
      ${tl?`<span class="itype">${tl}</span>`:''}
      ${cl?`<span class="icat">${cl}</span>`:''}
      ${i.sub_category?`<span class="isubcat">· ${esc(i.sub_category)}</span>`:''}
      ${priLabel?`<span style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);">${priLabel}</span>`:''}
      ${i.initiated_by?`<span class="iby">— ${esc(i.initiated_by)}</span>`:''}
    </div>
  </div>`;

  // Concept (full width)
  if(i.concept)html+=`<div class="pv-full pv-field"><div class="pv-fl">Concept</div><div class="pv-fv italic">${esc(i.concept)}</div></div>`;

  // Left column
  let left='';
  if(i.target_date||i.published_date){
    left+=`<div class="pv-field"><div class="pv-fl">Dates</div>`;
    if(i.target_date)left+=`<div class="pv-fv">Target: ${fmtDate(i.target_date)}</div>`;
    if(i.published_date)left+=`<div class="pv-fv">Published: ${fmtDate(i.published_date)}</div>`;
    left+=`</div>`;
  }
  if(i.spark_source)left+=`<div class="pv-field"><div class="pv-fl">Spark / Source</div><div class="pv-fv">${esc(i.spark_source)}</div></div>`;
  if(chatUrls.length)left+=`<div class="pv-field"><div class="pv-fl">Claude Chats</div><div class="pv-fv">${chatUrls.map((u,n)=>`<a href="${esc(u)}" target="_blank" rel="noopener">↗ Chat${chatUrls.length>1?' '+(n+1):''}</a>`).join('<br>')}</div></div>`;
  if(refUrls.length)left+=`<div class="pv-field"><div class="pv-fl">Source URLs</div><div class="pv-fv">${refUrls.map((u,n)=>`<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u.replace(/^https?:\/\/(www\.)?/,'').slice(0,42)+(u.length>52?'…':''))}</a>`).join('<br>')}</div></div>`;

  // Right column
  let right='';
  if(i.notes)right+=`<div class="pv-field"><div class="pv-fl">Notes</div><div class="pv-fv italic">${esc(i.notes)}</div></div>`;
  if(i.dropbox_url||i.figma_url||i.assets_note){
    right+=`<div class="pv-field"><div class="pv-fl">Project Links</div><div class="pv-fv">`;
    if(i.dropbox_url)right+=`<a href="${esc(i.dropbox_url)}" target="_blank" rel="noopener">⬡ Dropbox</a><br>`;
    if(i.figma_url)right+=`<a href="${esc(i.figma_url)}" target="_blank" rel="noopener">◈ Figma</a><br>`;
    if(i.assets_note)right+=`<span style="color:var(--muted);font-style:italic;">${esc(i.assets_note)}</span>`;
    right+=`</div></div>`;
  }

  html+=`<div>${left}</div><div>${right}</div>`;

  // Tags full width
  if(tags.length)html+=`<div class="pv-full pv-field"><div class="pv-fl">Tags</div><div class="pv-chips">${tags.map(t=>`<span class="itag">${esc(t)}</span>`).join('')}</div></div>`;

  // Images full width
  if(imgs.length)html+=`<div class="pv-full pv-field"><div class="pv-fl">Images</div><div class="pv-img-grid">${imgs.map(u=>`<img class="pv-img" src="${esc(u)}" onclick="openLightbox('${esc(u)}')" alt=""/>`).join('')}</div></div>`;

  document.getElementById('pv-body').innerHTML=html;
  document.getElementById('pv-ov').style.display='flex';
  document.body.style.overflow='hidden';
}
function closePV(){document.getElementById('pv-ov').style.display='none';document.body.style.overflow='';pvId=null;}
function pvToEdit(){if(!pvId)return;closePV();openEdit(pvId);}
</script>
