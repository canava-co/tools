<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bin Wall · CANAVA</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
:root {
  --ink:    #363675;
  --paper:  #f4f1ec;
  --accent: #c94f2a;
  --green:  #2d7d4f;
  --blue:   #2a6b9c;
  --muted:  rgba(54,54,117,.45);
  --border: rgba(54,54,117,.18);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--paper); color:var(--ink); font-family:'DM Sans',sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* ── HEADER ── */
.header {
  background:#ebe7e0;
  background-image:linear-gradient(rgba(54,54,117,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(54,54,117,.12) 1px,transparent 1px),linear-gradient(rgba(54,54,117,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(54,54,117,.05) 1px,transparent 1px);
  background-size:100px 100px,100px 100px,20px 20px,20px 20px;
  padding:14px 32px; border-bottom:1.5px solid var(--border);
  display:flex; align-items:center; gap:14px; flex-shrink:0;
}
.header-tag { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); display:flex; align-items:center; gap:6px; flex-shrink:0; }
.pulse-dot { width:6px; height:6px; border-radius:50%; background:var(--accent); animation:blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.25;transform:scale(.6)} }
.header-title { font-size:19px; font-weight:500; color:var(--ink); letter-spacing:-.01em; }
.header-sub { font-size:11px; color:var(--muted); font-weight:300; font-style:italic; }
.header-links { margin-left:auto; display:flex; gap:16px; }
.header-link { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--blue); letter-spacing:.08em; text-decoration:none; }
.header-link:hover { text-decoration:underline; }

/* ── TOOLBAR ── */
.toolbar {
  background:rgba(255,255,255,.72); border-bottom:1px solid var(--border);
  padding:7px 32px; display:flex; align-items:center; gap:12px; flex-shrink:0; flex-wrap:wrap;
}
.tb-lbl { font-family:'Share Tech Mono',monospace; font-size:8.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.tb-btn {
  font-family:'Share Tech Mono',monospace; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase;
  padding:4px 12px; background:transparent; border:1.5px solid var(--border); border-radius:3px;
  color:var(--ink); cursor:pointer; transition:background .1s; white-space:nowrap;
}
.tb-btn:hover { background:rgba(54,54,117,.06); }
.tb-btn.save { border-color:rgba(45,125,79,.55); color:var(--green); }
.tb-btn.save:hover { background:rgba(45,125,79,.07); }
.tb-btn.accent { border-color:rgba(201,79,42,.55); color:var(--accent); }
.tb-btn.accent:hover { background:rgba(201,79,42,.06); }
.tb-div { width:1px; height:20px; background:var(--border); flex-shrink:0; }
.tb-info { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:.06em; margin-left:auto; }

/* ── MAIN ── */
.main { display:flex; flex:1; overflow:hidden; }

/* ── COLOR PICKER ── */
.color-picker {
  width:180px; flex-shrink:0; background:rgba(255,255,255,.52);
  border-right:1.5px solid var(--border); padding:12px 14px; display:flex; flex-direction:column; gap:10px;
}
.cp-head { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.22em; text-transform:uppercase; color:var(--muted); margin-bottom:2px; }
.cp-row {
  display:flex; align-items:center; gap:8px; padding:6px 8px;
  border:1.5px solid var(--border); border-radius:3px; cursor:pointer;
  transition:background .1s; user-select:none;
}
.cp-row:hover { background:rgba(54,54,117,.05); }
.cp-row.active { border-color:var(--ink); background:rgba(54,54,117,.07); }
.cp-swatch { width:18px; height:18px; border-radius:2px; flex-shrink:0; }
.cp-name { font-size:12px; font-weight:400; color:var(--ink); }
.cp-count { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--muted); margin-left:auto; }

.cp-divider { height:1px; background:var(--border); margin:2px 0; }

.cp-actions { display:flex; flex-direction:column; gap:6px; margin-top:4px; }

/* ── CANVAS ── */
.canvas-wrap {
  flex:1; overflow:auto; padding:48px 48px 80px;
  background-color:var(--paper);
  background-image:linear-gradient(rgba(54,54,117,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(54,54,117,.04) 1px,transparent 1px);
  background-size:20px 20px;
  display:flex; align-items:flex-end; gap:0; justify-content:flex-start; position:relative;
}
.canvas-wrap::-webkit-scrollbar { width:6px; height:6px; }
.canvas-wrap::-webkit-scrollbar-thumb { background:rgba(54,54,117,.18); border-radius:3px; }

/* ── FLOOR ── */
.floor-line {
  position:absolute; bottom:48px; left:0; right:0;
  height:3px; background:var(--ink); opacity:.18;
  pointer-events:none;
}

.tb-btn.primary-action { background:var(--ink); color:var(--paper); border-color:var(--ink); font-size:10px; padding:4px 16px; }
.tb-btn.primary-action:hover { background:#2a2a5a; }

/* ── BIN WALL ── */
.bin-wall { display:flex; align-items:flex-end; gap:2px; position:relative; }

/* ── BIN COLUMN ── */
.bin-col { display:flex; flex-direction:column-reverse; gap:2px; position:relative; }

.bin-col-label {
  font-family:'Share Tech Mono',monospace; font-size:7px; letter-spacing:.08em;
  text-transform:uppercase; color:rgba(54,54,117,.3); text-align:center;
  margin-top:6px; white-space:nowrap;
}

/* ── ADD COLUMN ZONE ── */
.add-col-btn {
  width:40px; min-height:60px; border:2px dashed rgba(54,54,117,.15);
  border-radius:3px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:rgba(54,54,117,.25); font-size:22px; font-weight:300;
  transition:border-color .15s, color .15s; align-self:flex-end; margin-bottom:0;
}
.add-col-btn:hover { border-color:rgba(54,54,117,.4); color:var(--ink); }

/* ── BIN CELL ── */
.bin-cell {
  position:relative; cursor:pointer; border-radius:2px;
  display:flex; align-items:center; justify-content:center;
  transition:box-shadow .1s; overflow:hidden; flex-shrink:0;
  border:1.5px solid rgba(0,0,0,.12);
}
.bin-cell:hover { box-shadow:0 2px 10px rgba(0,0,0,.18); z-index:10; }
.bin-cell.empty {
  background:rgba(54,54,117,.05) !important;
  border:1.5px dashed rgba(54,54,117,.15) !important;
  cursor:default;
}
.bin-cell.labeled { cursor:pointer; }

.bin-code {
  font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:.06em;
  color:rgba(255,255,255,.92); text-align:center; padding:2px 3px;
  text-shadow:0 1px 3px rgba(0,0,0,.45); line-height:1.3; pointer-events:none;
}
.bin-code.dark { color:rgba(54,54,117,.7); text-shadow:none; }

.bin-rm {
  position:absolute; top:2px; right:2px;
  width:13px; height:13px; background:rgba(0,0,0,.3);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:9px; color:rgba(255,255,255,.9); cursor:pointer;
  opacity:0; transition:opacity .1s; z-index:10; font-family:Arial,sans-serif; line-height:1;
}
.bin-cell:hover .bin-rm { opacity:1; }
.bin-rm.dark { background:rgba(0,0,0,.15); color:rgba(54,54,117,.6); }

.bin-link-badge {
  position:absolute; bottom:2px; left:2px;
  width:10px; height:10px;
  background:rgba(42,107,156,.6); border-radius:50%;
  pointer-events:none;
}

/* ── COL REMOVE ── */
.col-rm {
  position:absolute; top:-20px; left:50%; transform:translateX(-50%);
  font-family:'Share Tech Mono',monospace; font-size:9px; color:rgba(201,79,42,.45);
  cursor:pointer; padding:2px 4px; border-radius:2px; transition:color .1s;
  white-space:nowrap;
}
.col-rm:hover { color:var(--accent); background:rgba(201,79,42,.07); }

/* ── EDIT OVERLAY ── */
.edit-overlay {
  position:fixed; inset:0; background:rgba(54,54,117,.12); backdrop-filter:blur(2px);
  z-index:8000; display:flex; align-items:center; justify-content:center;
}
.edit-box {
  background:var(--paper); border:1.5px solid var(--border); border-radius:4px;
  padding:20px 24px; min-width:280px; box-shadow:0 8px 40px rgba(54,54,117,.18);
}
.edit-title { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
.edit-box input[type="text"] {
  width:100%; font-family:'Share Tech Mono',monospace; font-size:13px;
  padding:7px 10px; border:1.5px solid var(--border); border-radius:3px;
  background:rgba(255,255,255,.7); color:var(--ink); outline:none; margin-bottom:10px; letter-spacing:.04em;
}
.edit-box input:focus { border-color:rgba(54,54,117,.45); }
.edit-link-row { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.edit-link-lbl { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; white-space:nowrap; }
.edit-btns { display:flex; gap:8px; justify-content:flex-end; }
.edit-btn { font-family:'Share Tech Mono',monospace; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; padding:5px 14px; border-radius:3px; border:1.5px solid var(--border); background:transparent; color:var(--ink); cursor:pointer; }
.edit-btn:hover { background:rgba(54,54,117,.06); }
.edit-btn.primary { background:var(--ink); color:var(--paper); border-color:var(--ink); }
.edit-btn.primary:hover { background:#2a2a5a; }

/* ── STATUS BAR ── */
.statusbar {
  height:23px; background:rgba(54,54,117,.06); border-top:1px solid var(--border);
  display:flex; align-items:center; padding:0 32px; gap:16px;
  font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:.08em; flex-shrink:0;
}
.sb-dot { width:5px; height:5px; border-radius:50%; background:var(--green); flex-shrink:0; }

/* ── MODAL ── */
.modal-backdrop { position:fixed; inset:0; background:rgba(54,54,117,.18); backdrop-filter:blur(2px); z-index:8000; display:flex; align-items:center; justify-content:center; }
.modal { background:var(--paper); border:1.5px solid var(--border); border-radius:4px; padding:22px 26px 20px; min-width:320px; max-width:420px; width:90vw; box-shadow:0 8px 40px rgba(54,54,117,.18); }
.modal-title { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
.modal input[type="text"] { width:100%; font-family:'Share Tech Mono',monospace; font-size:12px; padding:7px 10px; border:1.5px solid var(--border); border-radius:3px; background:rgba(255,255,255,.7); color:var(--ink); outline:none; margin-bottom:12px; letter-spacing:.04em; }
.modal input:focus { border-color:rgba(54,54,117,.45); }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; }
.modal-btn { font-family:'Share Tech Mono',monospace; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; padding:5px 14px; border-radius:3px; border:1.5px solid var(--border); background:transparent; color:var(--ink); cursor:pointer; transition:background .1s; }
.modal-btn:hover { background:rgba(54,54,117,.06); }
.modal-btn.primary { background:var(--ink); color:var(--paper); border-color:var(--ink); }
.modal-btn.primary:hover { background:#2a2a5a; }
.save-list { margin-bottom:14px; max-height:220px; overflow-y:auto; }
.save-row { display:flex; align-items:center; gap:8px; padding:7px 10px; border:1px solid var(--border); border-radius:3px; margin-bottom:5px; cursor:pointer; transition:background .1s; background:rgba(255,255,255,.55); }
.save-row:hover { background:rgba(54,54,117,.05); }
.save-row-name { flex:1; font-size:12px; font-weight:500; color:var(--ink); }
.save-row-ts { font-family:'Share Tech Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:.06em; }
.save-row-del { font-size:11px; color:rgba(201,79,42,.55); padding:2px 6px; cursor:pointer; border-radius:2px; }
.save-row-del:hover { background:rgba(201,79,42,.09); color:var(--accent); }
.modal-empty { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:.1em; color:var(--muted); text-align:center; padding:18px 0; }

/* ── TOAST ── */
.toast { position:fixed; bottom:34px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:rgba(255,255,255,.92); padding:6px 16px; border-radius:3px; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:.1em; opacity:0; transition:opacity .18s,transform .18s; pointer-events:none; z-index:9999; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-tag"><span class="pulse-dot"></span>CANAVA Tools</div>
  <span class="header-title">Bin Wall</span>
  <span class="header-sub">Floor-stacked bins · front elevation · labels + inventory links</span>
  <div class="header-links">
    <a class="header-link" href="storage-layout.html">⊞ Floor Plan</a>
    <a class="header-link" href="shelf-planner.html">⊟ Shelves</a>
    <a class="header-link" href="https://gerenmicol.github.io/personal/storage.html" target="_blank">⊟ Inventory ↗</a>
  </div>
</div>

<div class="toolbar">
  <span class="tb-lbl">Max stack</span>
  <select id="max-stack-sel" onchange="setMaxStack(+this.value)" style="font-family:'Share Tech Mono',monospace;font-size:10px;padding:3px 8px;border:1.5px solid var(--border);border-radius:3px;background:var(--paper);color:var(--ink);cursor:pointer;">
    <option value="3">3 high</option>
    <option value="4">4 high</option>
    <option value="5" selected>5 high (max rated)</option>
  </select>
  <div class="tb-div"></div>
  <button class="tb-btn primary-action" id="add-col-tb" onclick="addColumn()">+ Add Column</button>
  <span id="tb-selected-type" style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.08em;"></span>
  <div class="tb-div"></div>
  <span class="tb-lbl" id="tb-dims">22"W bins · 13"H each</span>
  <div class="tb-div"></div>
  <button class="tb-btn save"   onclick="openSaveModal()">↓ Save</button>
  <button class="tb-btn"        onclick="openLoadModal()">↑ Load</button>
  <button class="tb-btn accent" onclick="clearAll()">✕ Clear</button>
  <span class="tb-info" id="tb-info"></span>
</div>

<div class="main">
  <div class="color-picker" id="colorPicker"></div>
  <div class="canvas-wrap" id="cWrap">
    <div class="floor-line"></div>
    <div class="bin-wall" id="binWall"></div>
    <div class="add-col-btn" id="addColBtn" onclick="addColumn()" title="Add column">+</div>
  </div>
</div>

<div class="statusbar">
  <span class="sb-dot"></span>
  <span id="sb-info">0 bins placed</span>
  <span>·</span>
  <span id="sb-save">unsaved</span>
  <span>·</span>
  <span>click a color, then click + to add a column · click any bin to label it · hover × to remove</span>
</div>

<div class="toast" id="toast"></div>
<div id="modal-root"></div>
<div id="edit-root"></div>

<script>
// ─────────────────────────────────────────────────────────────────────
// CANAVA · Bin Wall
// Global Industrial tote: 21-7/8" L × 15-1/4" W × 12-7/8" H
// Storage: Supabase layouts table, prefix "binwall:"
// ─────────────────────────────────────────────────────────────────────

const BIN_W    = 22;     // inches, front face width (long side)
const BIN_D    = 15.25;  // inches depth (not shown in front elev)
const BIN_H    = 13;     // inches height
const SCALE    = 5;      // px per inch
const GAP      = 2;      // px gap between bins

const SB_URL   = 'https://rylapwjambqfppjktjra.supabase.co';
const SB_KEY   = 'sb_publishable_-h1S5LEUyy6-ffAdEGawcw_-Saflr7w';
const SB_HDR   = { 'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY };
const KEY_PFX  = 'binwall:';
const LS_KEY   = 'canava-binwall-v1';

const BIN_TYPES = {
  'lt-grey': { name:'Light Grey', color:'#a8a8a8', textDark:false },
  'dk-grey': { name:'Dark Grey',  color:'#2e2e2e', textDark:false },
  'white':   { name:'White',      color:'#d8d4cc', textDark:true, border:true },
  'clear':   { name:'Clear',      color:'rgba(160,210,240,0.35)', textDark:true, isClear:true },
};
const TYPE_ORDER = ['lt-grey','dk-grey','white','clear'];

// ── STATE ─────────────────────────────────────────────────────────────
const S = {
  maxStack:  5,
  selected:  'lt-grey',   // currently active bin type
  cols:      [],           // [{id, type, bins:[{code, invLink}|null]}]
  seq:       1,
  currentName: '',
};

// ── INIT ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  buildColorPicker();
  render();
});

// ── COLOR PICKER ──────────────────────────────────────────────────────
function buildColorPicker() {
  const el = document.getElementById('colorPicker');
  el.innerHTML = '';

  const head = document.createElement('div');
  head.className = 'cp-head';
  head.textContent = 'Bin type';
  el.appendChild(head);

  TYPE_ORDER.forEach(tid => {
    const t = BIN_TYPES[tid];
    const row = document.createElement('div');
    row.className = 'cp-row' + (S.selected===tid?' active':'');
    row.id = 'cprow-' + tid;
    let sw = `background:${t.color}`;
    if (t.border)   sw += ';border:1.5px solid rgba(54,54,117,.25)';
    if (t.isClear)  sw  = 'background:rgba(74,156,196,.22);border:1.5px dashed #4a9cc4';
    row.innerHTML = `<div class="cp-swatch" style="${sw}"></div><div class="cp-name">${t.name}</div>`;
    row.addEventListener('click', () => {
      S.selected = tid;
      document.querySelectorAll('.cp-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
      // update toolbar indicator
      const tbSel = document.getElementById('tb-selected-type');
      if (tbSel) tbSel.textContent = t.name.toLowerCase();
    });
    el.appendChild(row);
  });

  // Use appendChild — NOT innerHTML += (that destroys event listeners)
  const divider = document.createElement('div');
  divider.className = 'cp-divider';
  el.appendChild(divider);

  const note = document.createElement('div');
  note.style.cssText = 'font-family:"Share Tech Mono",monospace;font-size:8px;color:var(--muted);padding:6px 4px;letter-spacing:.06em;line-height:1.5';
  note.textContent = 'Select type, then click "+ Add Column" in toolbar.';
  el.appendChild(note);
}

// ── RENDER ────────────────────────────────────────────────────────────
function render() {
  const wall = document.getElementById('binWall');
  wall.innerHTML = '';

  S.cols.forEach(col => {
    const colEl = document.createElement('div');
    colEl.className = 'bin-col';

    // Remove column button
    const rm = document.createElement('div');
    rm.className = 'col-rm';
    rm.textContent = '×';
    rm.addEventListener('click', () => removeColumn(col.id));
    colEl.appendChild(rm);

    // Bins (bottom to top, so we reverse for display)
    for (let i = 0; i < S.maxStack; i++) {
      const bin = col.bins[i] || null;
      colEl.appendChild(buildBinCell(col, i, bin));
    }

    const lbl = document.createElement('div');
    lbl.className = 'bin-col-label';
    const colTypeId = col.defaultType || col.type || 'lt-grey';
    const t = BIN_TYPES[colTypeId] || BIN_TYPES['lt-grey'];
    // Show "mixed" if column has multiple bin types
    const types = new Set(col.bins.filter(Boolean).map(b => b.type || colTypeId));
    lbl.textContent = types.size > 1 ? 'mixed' : t.name.toLowerCase();
    colEl.appendChild(lbl);

    wall.appendChild(colEl);
  });

  updateInfo();
  updateDims();
}

function buildBinCell(col, slotIdx, bin) {
  // Per-slot type — falls back to col.defaultType then col.type for old saves
  const typeId = bin?.type || col.defaultType || col.type || 'lt-grey';
  const t   = BIN_TYPES[typeId] || BIN_TYPES['lt-grey'];
  const wpx = BIN_W * SCALE;
  const hpx = BIN_H * SCALE;

  const cell = document.createElement('div');
  cell.className = 'bin-cell' + (!bin ? ' empty' : '') + (bin?.code ? ' labeled' : '');
  cell.style.width  = wpx + 'px';
  cell.style.height = hpx + 'px';

  if (!bin) {
    // empty slot — click to fill with selected type
    cell.style.cursor = 'pointer';
    cell.addEventListener('click', () => { fillSlot(col.id, slotIdx); });
    return cell;
  }

  // filled bin
  let bg = t.color;
  if (t.isClear) { cell.style.background='rgba(160,210,240,0.35)'; cell.style.border='1.5px dashed #4a9cc4'; }
  else { cell.style.backgroundColor = bg; }
  if (t.border && !t.isClear) cell.style.border='1.5px solid rgba(54,54,117,.25)';

  if (bin.code) {
    const code = document.createElement('div');
    code.className = 'bin-code' + (t.textDark?' dark':'');
    code.textContent = bin.code;
    cell.appendChild(code);
  }

  if (bin.invLink) {
    const badge = document.createElement('div');
    badge.className = 'bin-link-badge';
    badge.title = 'Linked to inventory';
    cell.appendChild(badge);
  }

  // Remove (empty the slot)
  const rm = document.createElement('div');
  rm.className = 'bin-rm' + (t.textDark?' dark':'');
  rm.textContent = '×';
  rm.addEventListener('mousedown', e => e.stopPropagation());
  rm.addEventListener('click', e => { e.stopPropagation(); clearSlot(col.id, slotIdx); });
  cell.appendChild(rm);

  // Edit label on click
  cell.addEventListener('click', () => openEdit(col.id, slotIdx, bin));
  return cell;
}

// ── COLUMNS ───────────────────────────────────────────────────────────
function addColumn() {
  const t = BIN_TYPES[S.selected];
  // Each slot gets its own type (default = currently selected)
  const bins = new Array(S.maxStack).fill(null).map(() => ({ type: S.selected, code:'', invLink:'' }));
  S.cols.push({ id: S.seq++, defaultType: S.selected, bins });
  render(); markUnsaved();
  showToast(t.name + ' column added');
}

function removeColumn(id) {
  S.cols = S.cols.filter(c => c.id !== id);
  render(); markUnsaved();
}

function clearAll() {
  if (!confirm('Clear entire bin wall?')) return;
  S.cols = []; S.seq = 1;
  render(); markUnsaved();
  showToast('Cleared');
}

function setMaxStack(n) {
  S.maxStack = n;
  S.cols.forEach(col => {
    while (col.bins.length > n) col.bins.pop();
    while (col.bins.length < n) col.bins.push({ type: col.defaultType || S.selected, code:'', invLink:'' });
  });
  render(); markUnsaved();
}

function fillSlot(colId, idx) {
  const col = S.cols.find(c=>c.id===colId);
  if (!col) return;
  col.bins[idx] = { type: S.selected, code:'', invLink:'' };
  render(); markUnsaved();
}

function clearSlot(colId, idx) {
  const col = S.cols.find(c=>c.id===colId);
  if (!col) return;
  col.bins[idx] = null;
  render(); markUnsaved();
}

// ── EDIT LABEL ────────────────────────────────────────────────────────
function openEdit(colId, idx, bin) {
  const root = document.getElementById('edit-root');
  const invUrl = `https://gerenmicol.github.io/personal/storage.html`;
  root.innerHTML = `
    <div class="edit-overlay" id="edit-bd">
      <div class="edit-box">
        <div class="edit-title">Label Bin</div>
        <input type="text" id="edit-code" placeholder="BIN-A01 or code…" value="${escH(bin.code||'')}" maxlength="20" autocomplete="off"/>
        <div class="edit-link-row">
          <span class="edit-link-lbl">Inv. link</span>
          <input type="text" id="edit-link" placeholder="paste inventory bin code…" value="${escH(bin.invLink||'')}" style="flex:1"/>
        </div>
        <div class="edit-btns">
          <button class="edit-btn" onclick="closeEdit()">Cancel</button>
          <button class="edit-btn primary" onclick="saveEdit('${colId}',${idx})">Save</button>
        </div>
      </div>
    </div>`;
  document.getElementById('edit-bd').addEventListener('click', e => { if(e.target.id==='edit-bd') closeEdit(); });
  const inp = document.getElementById('edit-code');
  inp.focus(); inp.select();
  inp.addEventListener('keydown', e => { if(e.key==='Enter') saveEdit(colId,idx); if(e.key==='Escape') closeEdit(); });
}

function closeEdit() { document.getElementById('edit-root').innerHTML=''; }

function saveEdit(colId, idx) {
  const code = document.getElementById('edit-code').value.trim();
  const link = document.getElementById('edit-link').value.trim();
  const col  = S.cols.find(c=>c.id==colId);
  if (!col) return;
  col.bins[idx] = { code, invLink: link };
  closeEdit(); render(); markUnsaved();
  if (code) showToast('Labeled: ' + code);
}

function escH(s) { return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INFO ──────────────────────────────────────────────────────────────
function updateInfo() {
  const total   = S.cols.reduce((n,c) => n + c.bins.filter(Boolean).length, 0);
  const labeled = S.cols.reduce((n,c) => n + c.bins.filter(b=>b?.code).length, 0);
  document.getElementById('sb-info').textContent =
    `${total} bin${total!==1?'s':''} placed · ${labeled} labeled`;
  document.getElementById('tb-info').textContent =
    `${S.cols.length} col${S.cols.length!==1?'s':''} · ${(S.cols.length * BIN_W / 12).toFixed(1)}ft wide`;
}

function updateDims() {
  document.getElementById('tb-dims').textContent =
    `${BIN_W}"W bins · ${BIN_H}"H each · ${S.maxStack} high = ${(BIN_H*S.maxStack/12).toFixed(1)}ft`;
}

function markUnsaved() { document.getElementById('sb-save').textContent='unsaved'; }

// ── SUPABASE SAVE / LOAD ──────────────────────────────────────────────
async function sbSave(name, data) {
  const r = await fetch(`${SB_URL}/rest/v1/layouts`, { method:'POST', headers:{...SB_HDR,'Prefer':'resolution=merge-duplicates'}, body:JSON.stringify({name:KEY_PFX+name, data, updated_at:new Date().toISOString()}) });
  if(!r.ok) throw new Error('HTTP '+r.status);
}
async function sbLoad(name) {
  const r = await fetch(`${SB_URL}/rest/v1/layouts?name=eq.${encodeURIComponent(KEY_PFX+name)}&select=data`, {headers:SB_HDR});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const rows = await r.json();
  return rows?.length ? rows[0].data : null;
}
async function sbList() {
  const r = await fetch(`${SB_URL}/rest/v1/layouts?name=like.${encodeURIComponent(KEY_PFX)}*&select=name,updated_at&order=updated_at.desc`, {headers:SB_HDR});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return (await r.json()).map(rr=>({...rr, name:rr.name.replace(KEY_PFX,'')}));
}
async function sbDel(name) {
  const r = await fetch(`${SB_URL}/rest/v1/layouts?name=eq.${encodeURIComponent(KEY_PFX+name)}`, {method:'DELETE',headers:SB_HDR});
  if(!r.ok) throw new Error('HTTP '+r.status);
}

function closeModal() { document.getElementById('modal-root').innerHTML=''; }
function showModal(html) {
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-backdrop" id="modal-bd">${html}</div>`;
  root.querySelector('#modal-bd').addEventListener('click',e=>{if(e.target.id==='modal-bd')closeModal();});
}

function openSaveModal() {
  showModal(`<div class="modal"><div class="modal-title">↓ Save Bin Wall</div><input type="text" id="save-name-inp" placeholder="Layout name…" maxlength="60" autocomplete="off"/><div class="modal-btns"><button class="modal-btn" onclick="closeModal()">Cancel</button><button class="modal-btn primary" onclick="doSave()">Save</button></div></div>`);
  const inp=document.getElementById('save-name-inp');
  inp.value=S.currentName||''; inp.focus();
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSave();if(e.key==='Escape')closeModal();});
}

async function doSave() {
  const name=document.getElementById('save-name-inp').value.trim();
  if(!name) return;
  closeModal();
  document.getElementById('sb-save').textContent='saving…';
  const payload={cols:S.cols,maxStack:S.maxStack,seq:S.seq,ts:Date.now()};
  try { await sbSave(name,payload); localStorage.setItem(LS_KEY+':'+name,JSON.stringify(payload)); }
  catch(e) { console.warn('SB save failed, localStorage only:',e.message); localStorage.setItem(LS_KEY+':'+name,JSON.stringify(payload)); }
  S.currentName=name;
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  document.getElementById('sb-save').textContent=`"${name}" saved ${t}`;
  showToast('Saved: '+name);
}

async function openLoadModal() {
  showModal(`<div class="modal"><div class="modal-title">↑ Load</div><div class="modal-empty">Loading…</div></div>`);
  let rows=[];
  try { rows=await sbList(); } catch(e) {
    for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k?.startsWith(LS_KEY+':')){const n=k.slice((LS_KEY+':').length);try{const d=JSON.parse(localStorage.getItem(k));rows.push({name:n,updated_at:d.ts?new Date(d.ts).toISOString():''});}catch(ex){}}}
  }
  const listHtml=rows.length
    ?rows.map(r=>{const ts=r.updated_at?new Date(r.updated_at).toLocaleDateString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';const n=r.name.replace(/"/g,'&quot;');return`<div class="save-row" onclick="doLoad('${n}')"><div class="save-row-name">${r.name}</div><div class="save-row-ts">${ts}</div><div class="save-row-del" onclick="event.stopPropagation();doDel('${n}')">×</div></div>`;}).join('')
    :`<div class="modal-empty">No saved layouts yet</div>`;
  showModal(`<div class="modal"><div class="modal-title">↑ Load</div><div class="save-list">${listHtml}</div><div class="modal-btns"><button class="modal-btn" onclick="closeModal()">Cancel</button></div></div>`);
}

async function doLoad(name) {
  closeModal();
  document.getElementById('sb-save').textContent='loading…';
  let d=null;
  try{d=await sbLoad(name);}catch(e){}
  if(!d){try{d=JSON.parse(localStorage.getItem(LS_KEY+':'+name));}catch(ex){}}
  if(!d){showToast('Not found'); document.getElementById('sb-save').textContent='unsaved'; return;}
  S.cols=d.cols||[]; S.maxStack=d.maxStack||5; S.seq=d.seq||1; S.currentName=name;
  document.getElementById('max-stack-sel').value=S.maxStack;
  render();
  const ts=d.ts?new Date(d.ts).toLocaleDateString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}):'';
  document.getElementById('sb-save').textContent=`"${name}" · ${ts}`;
  showToast('Loaded: '+name);
}

async function doDel(name) {
  if(!confirm(`Delete "${name}"?`)) return;
  try{await sbDel(name);}catch(e){}
  localStorage.removeItem(LS_KEY+':'+name);
  showToast('Deleted: '+name);
  openLoadModal();
}

let _tt;
function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>el.classList.remove('show'),2400);
}
</script>
