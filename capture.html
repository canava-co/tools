<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Capture">
<meta name="theme-color" content="#E1D4C9">
<title>Capture — Geren Lockhart</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#E1D4C9;--card:#f4f1ec;--navy:#363657;--blue:#3385E3;
  --muted:#7a6a5e;--faint:#b5a595;--line:rgba(54,54,87,0.13);
  --plum:#8B2662;--high:#8a2020;--low:#2a5e3e;
  --f:Helvetica,Arial,sans-serif;
}
html,body{background:var(--bg);color:var(--navy);font-family:var(--f);min-height:100vh;}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 40px 12px;padding-top:max(14px,env(safe-area-inset-top));border-bottom:1px solid var(--blue);background:var(--bg);position:sticky;top:0;z-index:10;}
.hdr-logo{height:42px;display:block;}
.hdr-date{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--navy);opacity:.6;text-align:right;line-height:1.8;}
.cap-outer{padding:14px 40px;}
.cap{background:var(--card);border:1px solid var(--navy);padding:16px 20px 14px;}
.cap-label{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);margin-bottom:9px;}
textarea#raw{font-family:var(--f);font-size:14px;font-style:italic;color:var(--navy);background:transparent;border:none;outline:none;resize:none;width:100%;line-height:1.4;min-height:24px;padding:0;display:block;}
textarea#raw::placeholder{color:var(--faint);}
.field-row{display:flex;align-items:flex-start;margin-top:11px;border-top:1px solid var(--line);padding-top:10px;}
.fi{display:flex;flex-direction:column;gap:4px;padding:0 16px 0 0;flex-shrink:0;}
.fi+.fi{padding-left:16px;border-left:1px solid var(--line);}
.fi.url-fi{flex:0 0 180px;}.fi.cat-fi{flex:0 0 110px;}.fi.pri-fi{flex:0 0 84px;}.fi.date-fi{flex:0 0 150px;}.fi.notes-fi{flex:1;min-width:80px;}.fi.act-fi{flex:0 0 auto;padding-right:0;align-items:flex-end;justify-content:flex-end;padding-top:2px;gap:7px;}
.fi label{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.fi input,.fi select,.fi textarea{font-family:var(--f);font-size:11px;color:var(--navy);background:transparent;border:none;outline:none;-webkit-appearance:none;appearance:none;padding:0;width:100%;}
.fi input::placeholder,.fi textarea::placeholder{color:var(--faint);}
.fi select option{background:var(--card);color:var(--navy);}
.fi input[type="date"]{cursor:pointer;}
.fi textarea{resize:none;font-style:italic;min-height:32px;}
.tog{display:flex;align-items:center;gap:6px;margin-top:6px;cursor:pointer;user-select:none;}
.tog-track{width:26px;height:14px;background:var(--faint);border-radius:7px;border:1px solid rgba(54,54,87,.18);transition:background .2s,border-color .2s;position:relative;flex-shrink:0;}
.tog-dot{position:absolute;top:2px;left:2px;width:10px;height:10px;background:white;border-radius:50%;transition:left .18s;}
.tog.on .tog-track{background:var(--blue);border-color:var(--blue);}.tog.on .tog-dot{left:14px;}
.tog-label{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s;white-space:nowrap;}.tog.on .tog-label{color:var(--blue);}
input#photo-file,input#edit-photo-file{display:none;}
.photo-preview{display:none;align-items:center;gap:8px;margin-top:9px;padding-top:9px;border-top:1px solid var(--line);}
.photo-preview img{height:34px;border:1px solid var(--line);}.photo-preview span{font-size:9px;color:var(--muted);}
.cap-status{font-size:9px;font-style:italic;color:var(--muted);min-height:14px;margin-top:7px;}
.cap-status.ok{color:var(--low);}.cap-status.err{color:var(--high);}
.btn{font-family:var(--f);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);background:transparent;border:1px solid var(--navy);border-radius:0;padding:6px 14px;cursor:pointer;transition:background .13s,color .13s;white-space:nowrap;line-height:1;display:inline-block;flex-shrink:0;}
.btn:hover{background:var(--navy);color:var(--card);}.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn.blue{color:var(--blue);border-color:var(--blue);}.btn.blue:hover{background:var(--blue);color:var(--card);}
.btn.ghost{color:var(--muted);border-color:var(--faint);}.btn.ghost:hover{border-color:var(--muted);color:var(--navy);}
.btn.danger{color:var(--high);border-color:var(--high);}.btn.danger:hover{background:var(--high);color:white;}
.btn.xs{font-size:8px;padding:4px 10px;}
.ctrl-outer{border-top:1px solid var(--blue);border-bottom:1px solid var(--blue);background:var(--bg);position:sticky;top:70px;z-index:9;}
.ctrl-tabs{display:flex;align-items:stretch;border-bottom:1px solid var(--line);min-height:38px;}
.c-tab{font-family:var(--f);font-size:9px;font-weight:bold;letter-spacing:.14em;text-transform:uppercase;color:var(--navy);padding:0 20px;border:none;border-bottom:2px solid transparent;background:transparent;cursor:pointer;transition:all .14s;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.c-tab:first-child{padding-left:40px;}.c-tab.on{color:var(--blue);border-bottom-color:var(--blue);}.c-tab:hover:not(.on){color:var(--blue);opacity:.7;}
.tab-n{font-size:7px;font-weight:normal;opacity:.6;}
.ctrl-filters{display:flex;align-items:center;justify-content:center;min-height:34px;}
.c-select{font-family:var(--f);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);background:transparent;border:none;border-right:1px solid var(--line);outline:none;padding:0 18px;cursor:pointer;-webkit-appearance:none;appearance:none;height:34px;}
.c-select:hover{color:var(--blue);}.c-select option{background:var(--bg);color:var(--navy);}
.c-search{font-family:var(--f);font-size:10px;color:var(--navy);background:rgba(244,241,236,0.55);border:none;border-left:1px solid var(--line);outline:none;padding:0 16px;width:180px;height:34px;}
.c-search::placeholder{color:var(--navy);opacity:.4;}
.list{padding:0 40px 80px;}
.empty{padding:60px 0;text-align:center;}.empty img{height:36px;opacity:.1;display:block;margin:0 auto 14px;}.empty p{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint);}
.row{display:grid;grid-template-columns:3px 1fr auto;gap:0 22px;align-items:start;padding:16px 0;border-bottom:1px solid var(--line);animation:up .16s ease both;}
@keyframes up{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}
.pip{width:3px;border-radius:0;margin-top:5px;}.pip.high{background:var(--high);height:30px;}.pip.medium{background:var(--plum);height:20px;}.pip.low{background:var(--low);height:12px;}
.rtitle{font-size:14px;font-style:italic;color:var(--navy);line-height:1.3;margin-bottom:5px;}.row.done .rtitle{text-decoration:line-through;color:var(--muted);}
.rmeta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:3px;}
.rtype{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--blue);}.rdue{font-size:8px;color:var(--muted);}.rdue.late{color:var(--high);font-weight:bold;}
.rnext{font-size:8px;color:var(--blue);opacity:.8;}.rpri{font-size:7px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);opacity:.65;}.radded{font-size:7px;color:var(--muted);opacity:.45;}
.rnotes{font-size:11px;font-style:italic;color:var(--muted);margin-top:4px;line-height:1.45;}
.rurl{display:block;font-size:8px;color:var(--blue);text-decoration:none;margin-top:4px;opacity:.75;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:420px;}.rurl:hover{opacity:1;}
.rcal{font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:var(--low);margin-top:3px;}
.rthumb{margin-top:6px;}.rthumb img{height:52px;border:1px solid var(--line);}
.rdownload{display:inline-block;margin-top:4px;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);text-decoration:none;opacity:.75;}.rdownload:hover{opacity:1;}
.racts{display:flex;flex-direction:column;gap:5px;align-items:flex-end;padding-top:2px;}
.del-confirm{display:none;margin-top:6px;border:1px solid var(--high);padding:10px 12px;background:var(--card);}.del-confirm p{font-size:9px;color:var(--navy);margin-bottom:8px;font-style:italic;}.del-confirm-btns{display:flex;gap:6px;}
.modal-bg{position:fixed;inset:0;background:rgba(54,54,87,.26);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:var(--card);border:1px solid var(--navy);border-radius:0;padding:22px 24px;width:500px;max-width:92vw;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:8px;letter-spacing:.22em;text-transform:uppercase;color:var(--blue);margin-bottom:16px;}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}.mf label{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.mf input,.mf select,.mf textarea{font-family:var(--f);font-size:12px;color:var(--navy);background:transparent;border:none;border-bottom:1px solid var(--line);outline:none;padding:5px 0;-webkit-appearance:none;appearance:none;width:100%;}
.mf select option{background:var(--card);color:var(--navy);}.mf textarea{resize:vertical;min-height:50px;}
.mf-row{display:grid;grid-template-columns:1fr 1fr;gap:0 24px;}
.modal-section{border-top:1px solid var(--line);padding-top:12px;margin:4px 0 14px;}.modal-section-title{font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.modal-tog-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}.modal-tog-name{font-size:10px;color:var(--navy);}
.modal-actions{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:16px;border-top:1px solid var(--line);padding-top:14px;}.modal-actions-right{display:flex;gap:8px;}
.spin{display:inline-block;width:9px;height:9px;border:1px solid var(--faint);border-top-color:var(--blue);border-radius:50%;animation:ro .7s linear infinite;vertical-align:middle;margin-right:5px;}
@keyframes ro{to{transform:rotate(360deg);}}
@media(max-width:768px){
  .hdr{padding:12px 16px 10px;padding-top:max(12px,env(safe-area-inset-top));}.hdr-logo{height:32px;}.hdr-date{font-size:8px;}
  .cap-outer{padding:10px 16px;}.cap{padding:14px 14px 12px;max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  textarea#raw{font-size:13px;}
  .field-row{flex-direction:column;}
  .fi{flex:none !important;width:100% !important;padding:10px 0 !important;border-left:none !important;border-bottom:1px solid var(--line);}
  .fi:last-child{border-bottom:none;}
  .fi.act-fi{flex-direction:row !important;justify-content:flex-end;align-items:center;gap:8px;border-bottom:none;padding-top:10px !important;}
  .fi input[type="date"]{display:block;width:100%;font-size:13px;color:var(--navy);-webkit-appearance:none;border-bottom:1px solid var(--line);padding:4px 0;margin-bottom:6px;}
  .ctrl-outer{top:56px;}.ctrl-tabs{overflow-x:auto;}.c-tab:first-child{padding-left:16px;}.c-tab{padding:0 14px;font-size:8px;}
  .ctrl-filters{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--line);}
  .c-select{border:none;border-bottom:1px solid var(--line);border-right:1px solid var(--line);padding:9px 12px;height:auto;width:100%;font-size:8px;}.c-select:nth-child(even){border-right:none;}
  .c-search{grid-column:1/-1;width:100%;border:none;border-top:1px solid var(--line);padding:9px 12px;height:auto;}
  .list{padding:0 16px 60px;}
  .row{grid-template-columns:3px 1fr;grid-template-rows:auto auto;}.pip{grid-row:1/3;}.rbody{grid-column:2;}
  .racts{grid-column:2;flex-direction:row;flex-wrap:wrap;justify-content:flex-start;padding-top:8px;gap:5px;}
  .btn.xs{font-size:7px;padding:4px 8px;}.modal{width:92vw;padding:18px 16px;}
}
</style>
</head>

<div class="modal-bg" id="edit-modal" style="display:none" onclick="maybeClose(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Edit</div>
    <input type="hidden" id="edit-id"/>
    <input type="hidden" id="edit-cal-id"/>
    <div class="mf"><label>Title</label><input id="edit-title" type="text"/></div>
    <div class="mf"><label>Notes</label><textarea id="edit-notes"></textarea></div>
    <div class="mf"><label>URL</label><input id="edit-url" type="url"/></div>
    <div class="mf-row">
      <div class="mf"><label>Category</label>
        <select id="edit-cat">
          <option value="task">Task</option><option value="appointment">Appointment</option>
          <option value="idea">Idea</option><option value="note">Note</option>
          <option value="contact">Contact</option><option value="follow-up">Follow-up</option>
          <option value="reference">Reference</option>
        </select>
      </div>
      <div class="mf"><label>Priority</label>
        <select id="edit-pri">
          <option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option>
        </select>
      </div>
    </div>
    <div class="mf-row">
      <div class="mf"><label>Due Date</label><input id="edit-due" type="date"/></div>
      <div class="mf"><label>Next Step Date</label><input id="edit-next" type="date"/></div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Send to Google Calendar</div>
      <div class="modal-tog-row">
        <span class="modal-tog-name">Due date</span>
        <div class="tog" id="edit-tog-due" onclick="toggleEdit('due')">
          <div class="tog-track"><div class="tog-dot"></div></div>
          <span class="tog-label">Off</span>
        </div>
      </div>
      <div class="modal-tog-row">
        <span class="modal-tog-name">Next step date</span>
        <div class="tog" id="edit-tog-next" onclick="toggleEdit('next')">
          <div class="tog-track"><div class="tog-dot"></div></div>
          <span class="tog-label">Off</span>
        </div>
      </div>
    </div>
    <div class="modal-section">
      <div class="modal-section-title">Photo / File</div>
      <div id="edit-photo-prev" style="display:none;align-items:center;gap:8px;margin-bottom:10px;">
        <img id="edit-photo-img" style="height:40px;border:1px solid var(--line);"/>
        <span id="edit-photo-name" style="font-size:9px;color:var(--muted);"></span>
        <button class="btn ghost xs" onclick="clearEditPhoto()">Remove</button>
      </div>
      <button class="btn ghost xs" onclick="document.getElementById('edit-photo-file').click()">+ Attach Photo / File</button>
      <input type="file" id="edit-photo-file" accept="image/*,.pdf,.doc,.docx" onchange="handleEditFile(this)"/>
    </div>
    <div id="del-confirm" class="del-confirm">
      <p>Delete permanently? This cannot be undone.</p>
      <div class="del-confirm-btns">
        <button class="btn ghost xs" onclick="document.getElementById('del-confirm').style.display='none'">Cancel</button>
        <button class="btn danger xs" onclick="confirmDelete()">Delete permanently</button>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn danger xs" onclick="document.getElementById('del-confirm').style.display='block'">Delete</button>
      <div class="modal-actions-right">
        <button class="btn ghost xs" onclick="closeEdit()">Cancel</button>
        <button class="btn blue xs" id="save-btn" onclick="saveEdit()">Save</button>
      </div>
    </div>
  </div>
</div>

<script>
const SB   = 'https://rylapwjambqfppjktjra.supabase.co';
const AK   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ5bGFwd2phbWJxZnBwamt0anJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNjgxMjEsImV4cCI6MjA4ODc0NDEyMX0.SyTXZI2zv5EL9l7ie5uOSXvGj10G03E0yjXL0m0BgMY';
const EDGE = SB + '/functions/v1/swift-responder';
const SB_STORAGE = SB + '/storage/v1/object/public/attachments/';
const SB_UPLOAD  = SB + '/storage/v1/object/attachments/';

var tasks = [], tab = 'active';
var attachedFile = null, editAttachedFile = null;
var capCal  = { due: false, next: false };
var editCal = { due: false, next: false };

function applyTog(el, on, onTxt, offTxt) {
  el.classList.toggle('on', on);
  el.querySelector('.tog-label').textContent = on ? onTxt : offTxt;
}
function toggleCap(w) { capCal[w] = !capCal[w]; applyTog(document.getElementById('tog-'+w), capCal[w], 'Calendar on', 'Calendar off'); }
function toggleEdit(w) { editCal[w] = !editCal[w]; applyTog(document.getElementById('edit-tog-'+w), editCal[w], 'On', 'Off'); }
function resetEditToggles() {
  ['due','next'].forEach(function(w) {
    editCal[w] = false;
    applyTog(document.getElementById('edit-tog-'+w), false, 'On', 'Off');
  });
}

var nd = new Date();
document.getElementById('hdr-date').innerHTML =
  nd.toLocaleDateString('en-US',{weekday:'long'}).toUpperCase() + '<br>' +
  nd.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});

function grow(el) { el.style.height='auto'; el.style.height=el.scrollHeight+'px'; }
var rawEl = document.getElementById('raw');
rawEl.addEventListener('input', function() { grow(this); });
rawEl.addEventListener('keydown', function(e) { if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)) doCapture(); });
document.getElementById('f-notes').addEventListener('input', function() { grow(this); });

function handleFile(inp) {
  var f = inp.files[0]; if(!f) return;
  attachedFile = f;
  var prev = document.getElementById('photo-preview');
  prev.style.display = 'flex';
  if (f.type.startsWith('image/')) {
    var r = new FileReader();
    r.onload = function(e) { prev.innerHTML = '<img src="'+e.target.result+'"/><span>'+f.name+'</span>'; };
    r.readAsDataURL(f);
  } else { prev.innerHTML = '<span>'+f.name+'</span>'; }
}

function handleEditFile(inp) {
  var f = inp.files[0]; if(!f) return;
  editAttachedFile = f;
  var prev = document.getElementById('edit-photo-prev');
  var img  = document.getElementById('edit-photo-img');
  document.getElementById('edit-photo-name').textContent = f.name;
  prev.style.display = 'flex';
  if (f.type.startsWith('image/')) {
    var r = new FileReader();
    r.onload = function(e) { img.src = e.target.result; img.style.display='block'; };
    r.readAsDataURL(f);
  } else { img.style.display = 'none'; }
}

function clearEditPhoto() {
  editAttachedFile = null;
  document.getElementById('edit-photo-file').value = '';
  document.getElementById('edit-photo-prev').style.display = 'none';
}

async function uploadPhoto(file) {
  var ext = file.name.split('.').pop();
  var path = Date.now()+'-'+Math.random().toString(36).slice(2)+'.'+ext;
  try {
    var r = await fetch(SB_UPLOAD+path, {
      method: 'POST',
      headers: { 'Authorization':'Bearer '+AK, 'Content-Type':file.type, 'x-upsert':'true' },
      body: file
    });
    if (r.ok) return SB_STORAGE+path;
  } catch(e) {}
  return null;
}

async function api(path, opts) {
  opts = opts || {};
  var headers = Object.assign({'Content-Type':'application/json','Authorization':'Bearer '+AK,'apikey':AK}, opts.headers||{});
  var r = await fetch(SB+path, Object.assign({}, opts, {headers: headers}));
  return r.json();
}

async function load() {
  try {
    var d = await api('/rest/v1/tasks?select=*&order=due_date.asc.nullslast,created_at.desc');
    if (Array.isArray(d)) { tasks=d; counts(); render(); }
    else showEmpty('Nothing here yet');
  } catch(e) { st('Could not reach database.','err'); showEmpty('Connection error'); }
}

function counts() {
  ['active','done','archived'].forEach(function(s) {
    document.getElementById('n-'+s).textContent = tasks.filter(function(t){return t.status===s;}).length;
  });
}

function inferCat(t) {
  if (t.category) return t.category;
  var tx = ((t.raw_input||'')+' '+(t.title||'')).toLowerCase();
  if (/\blunch\b|\bdinner\b|\bmeeting\b|\bappointment\b|\bcall\b|\bat \d|\bpm\b|\bam\b/.test(tx)) return 'appointment';
  if (/\bfollow.?up\b|\bcheck in\b/.test(tx)) return 'follow-up';
  if (/\bidea\b|\bconcept\b|\bpitch\b/.test(tx)) return 'idea';
  if (/\bnote\b|\bremember\b|\bfyi\b/.test(tx)) return 'note';
  if (/\bcontact\b|\breach out\b/.test(tx)) return 'contact';
  if (/\breference\b|\bread\b/.test(tx)) return 'reference';
  return 'task';
}

function fmt(d) {
  if (!d) return '';
  var dt=new Date(d+'T12:00:00'), t=new Date(); t.setHours(0,0,0,0);
  var diff=Math.round((dt-t)/86400000);
  if(diff===0)return'Today'; if(diff===1)return'Tomorrow'; if(diff===-1)return'Yesterday';
  if(diff>1&&diff<7)return dt.toLocaleDateString('en-US',{weekday:'long'});
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtAdded(d) { if(!d)return''; return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function isLate(d) { return d && new Date(d+'T23:59:59') < new Date(); }
function isWeek(d) {
  if(!d)return false;
  var dt=new Date(d+'T12:00:00'),t=new Date();t.setHours(0,0,0,0);
  return Math.round((dt-t)/86400000)>=0 && Math.round((dt-t)/86400000)<7;
}

// Button click handlers using data attributes to avoid escaping issues
document.addEventListener('click', function(e) {
  var btn = e.target.closest('button[data-id]');
  if (!btn) return;
  var id = btn.getAttribute('data-id');
  var action = btn.getAttribute('data-action');
  if (action === 'complete') upd(id, 'done');
  else if (action === 'restore') upd(id, 'active');
  else if (action === 'archive') upd(id, 'archived');
  else if (action === 'edit') openEdit(id);
  else if (action === 'delete') deleteTask(id);
  else if (action === 'delete-confirm') confirmDeleteCard(id);
});

function render() {
  var sort=document.getElementById('c-sort').value;
  var fc=document.getElementById('c-cat').value;
  var fp=document.getElementById('c-pri').value;
  var fw=document.getElementById('c-when').value;
  var q=(document.getElementById('c-srch').value||'').toLowerCase();
  var list=tasks.filter(function(t){return t.status===tab;});
  if(fc)list=list.filter(function(t){return inferCat(t)===fc;});
  if(fp)list=list.filter(function(t){return (t.priority||'medium')===fp;});
  if(fw==='today')list=list.filter(function(t){return fmt(t.due_date)==='Today';});
  if(fw==='week')list=list.filter(function(t){return isWeek(t.due_date);});
  if(fw==='overdue')list=list.filter(function(t){return isLate(t.due_date);});
  if(fw==='next-today')list=list.filter(function(t){return fmt(t.next_step_date)==='Today';});
  if(fw==='next-week')list=list.filter(function(t){return isWeek(t.next_step_date);});
  if(fw==='none')list=list.filter(function(t){return !t.due_date&&!t.next_step_date;});
  if(q)list=list.filter(function(t){return ((t.title||'')+(t.notes||'')+(t.raw_input||'')).toLowerCase().includes(q);});
  var po={high:0,medium:1,low:2};
  if(sort==='priority')list.sort(function(a,b){return (po[a.priority||'medium'])-(po[b.priority||'medium']);});
  else if(sort==='new')list.sort(function(a,b){return new Date(b.created_at)-new Date(a.created_at);});
  else if(sort==='cat')list.sort(function(a,b){return inferCat(a).localeCompare(inferCat(b));});
  else if(sort==='alpha')list.sort(function(a,b){return (a.title||'').localeCompare(b.title||'');});
  else if(sort==='next')list.sort(function(a,b){
    if(!a.next_step_date&&!b.next_step_date)return 0;
    if(!a.next_step_date)return 1; if(!b.next_step_date)return -1;
    return new Date(a.next_step_date)-new Date(b.next_step_date);
  });
  var el=document.getElementById('list');
  if(!list.length){showEmpty(tab==='active'?'Nothing here - capture your first thought above':'Nothing in this view');return;}
  el.innerHTML=list.map(function(t){
    var c=inferCat(t),p=t.priority||'medium',due=fmt(t.due_date),nxt=fmt(t.next_step_date),late=tab==='active'&&isLate(t.due_date);
    var acts='';
    if(tab==='active'){
      acts='<button class="btn blue xs" data-id="'+t.id+'" data-action="complete">Complete</button>'
          +'<button class="btn xs" data-id="'+t.id+'" data-action="edit">Edit</button>'
          +'<button class="btn ghost xs" data-id="'+t.id+'" data-action="archive">Archive</button>'
          +'<button class="btn danger xs" data-id="'+t.id+'" data-action="delete">Delete</button>';
    }else if(tab==='done'){
      acts='<button class="btn xs" data-id="'+t.id+'" data-action="restore">Restore</button>'
          +'<button class="btn xs" data-id="'+t.id+'" data-action="edit">Edit</button>'
          +'<button class="btn ghost xs" data-id="'+t.id+'" data-action="archive">Archive</button>'
          +'<button class="btn danger xs" data-id="'+t.id+'" data-action="delete">Delete</button>';
    }else{
      acts='<button class="btn xs" data-id="'+t.id+'" data-action="restore">Restore</button>'
          +'<button class="btn xs" data-id="'+t.id+'" data-action="edit">Edit</button>'
          +'<button class="btn danger xs" data-id="'+t.id+'" data-action="delete">Delete</button>';
    }
    return '<div class="row'+(tab==='done'?' done':'')+'" id="row-'+t.id+'">'
      +'<div class="pip '+p+'"></div>'
      +'<div class="rbody">'
      +'<div class="rtitle">'+(t.title||t.raw_input||'')+'</div>'
      +'<div class="rmeta">'
      +'<span class="rtype">'+c+'</span>'
      +(due?'<span class="rdue'+(late?' late':'')+'">Due '+due+'</span>':'')
      +(nxt?'<span class="rnext">Next: '+nxt+'</span>':'')
      +'<span class="rpri">'+p+'</span>'
      +'<span class="radded">Added '+fmtAdded(t.created_at)+'</span>'
      +'</div>'
      +(t.notes?'<div class="rnotes">'+t.notes+'</div>':'')
      +(t.url?'<a class="rurl" href="'+t.url+'" target="_blank">'+t.url.replace(/^https?:\/\//,'')+'</a>':'')
      +(t.calendar_event_id?'<div class="rcal">On calendar</div>':'')
      +(t.photo_url?'<div class="rthumb"><img src="'+t.photo_url+'" alt=""/><br><a class="rdownload" href="'+t.photo_url+'" download target="_blank">Download</a></div>':'')
      +'</div>'
      +'<div class="racts">'+acts+'</div>'
      +'</div>';
  }).join('');
}

function showEmpty(msg) {
  document.getElementById('list').innerHTML='<div class="empty"><img id="empty-logo" alt=""/><p>'+msg+'</p></div>';
  var el=document.getElementById('empty-logo');
  if(el) el.src=document.getElementById('hdr-logo').src;
}

async function doCapture() {
  var raw=rawEl.value.trim();
  if(!raw){st('What would you like to capture?','err');return;}
  var url=document.getElementById('f-url').value.trim();
  var notes=document.getElementById('f-notes').value.trim();
  var dueDate=document.getElementById('f-due').value;
  var nextDate=document.getElementById('f-next').value;
  var cat=document.getElementById('f-cat').value;
  var pri=document.getElementById('f-pri').value;
  var dueCal=capCal.due, nextCal=capCal.next;
  var btn=document.getElementById('cap-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  st('Sending...','');
  try {
    var body = { raw_input: raw, add_to_calendar: (dueCal || nextCal) };
    if(url)      body.url            = url;
    if(dueDate)  body.due_date       = dueDate;
    if(nextDate) body.next_step_date = nextDate;
    if(cat)      body.category       = cat;
    if(pri)      body.priority       = pri;
    if(notes)    body.notes          = notes;

    // Show debug panel
    var dp = document.getElementById('debug-panel');
    dp.style.display='block';
    dp.textContent = 'SENDING:\n' + JSON.stringify(body, null, 2);
    var r = await fetch(EDGE, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+AK},
      body: JSON.stringify(body)
    });
    var data = await r.json();
    dp.textContent += '\n\nRESPONSE:\n' + JSON.stringify(data, null, 2);

    if(data.success && data.task) {
      var task = data.task;
      if(attachedFile) {
        st('Uploading photo...','');
        var photoUrl = await uploadPhoto(attachedFile);
        if(photoUrl) {
          task.photo_url = photoUrl;
          await api('/rest/v1/tasks?id=eq.'+task.id, {method:'PATCH', body:JSON.stringify({photo_url:photoUrl})});
        }
      }
      tasks.unshift(task);
      rawEl.value=''; rawEl.style.height='auto';
      document.getElementById('f-url').value='';
      document.getElementById('f-due').value='';
      document.getElementById('f-next').value='';
      var fn=document.getElementById('f-notes'); fn.value=''; fn.style.height='auto';
      var pp=document.getElementById('photo-preview'); pp.innerHTML=''; pp.style.display='none';
      document.getElementById('photo-file').value='';
      attachedFile=null;
      if(capCal.due) toggleCap('due');
      if(capCal.next) toggleCap('next');
      counts();
      if(tab!=='active') setTab('active',document.querySelector('.c-tab'));
      else render();
      var calMsg=(dueCal||nextCal)&&task.calendar_event_id?' - added to calendar':'';
      st('"'+(task.title||raw).substring(0,50)+'" captured'+calMsg,'ok');
    } else {
      st('Error: '+(data.error||'unknown'),'err');
    }
  } catch(e) { st('Network error: '+e.message,'err'); }
  btn.disabled=false; btn.innerHTML='Send';
}

async function upd(id, s) {
  var u={status:s};
  if(s==='done')u.completed_at=new Date().toISOString();
  if(s==='archived')u.archived_at=new Date().toISOString();
  if(s==='active'){u.completed_at=null;u.archived_at=null;}
  try{await api('/rest/v1/tasks?id=eq.'+id,{method:'PATCH',body:JSON.stringify(u)});}catch(e){}
  var i=tasks.findIndex(function(t){return t.id===id;});
  if(i>-1)Object.assign(tasks[i],u);
  counts(); render();
}

function openEdit(id) {
  var t=tasks.find(function(x){return x.id===id;});
  if(!t)return;
  document.getElementById('edit-id').value    = id;
  document.getElementById('edit-cal-id').value = t.calendar_event_id||'';
  document.getElementById('edit-title').value = t.title||t.raw_input||'';
  document.getElementById('edit-notes').value = t.notes||'';
  document.getElementById('edit-url').value   = t.url||'';
  document.getElementById('edit-cat').value   = inferCat(t);
  document.getElementById('edit-pri').value   = t.priority||'medium';
  document.getElementById('edit-due').value   = t.due_date||'';
  document.getElementById('edit-next').value  = t.next_step_date||'';
  resetEditToggles();
  var prev=document.getElementById('edit-photo-prev');
  var img=document.getElementById('edit-photo-img');
  if(t.photo_url){
    img.src=t.photo_url; img.style.display='block';
    document.getElementById('edit-photo-name').textContent='Current attachment';
    prev.style.display='flex';
  }else{prev.style.display='none';}
  editAttachedFile=null;
  document.getElementById('del-confirm').style.display='none';
  document.getElementById('edit-modal').style.display='flex';
}

function maybeClose(e){ if(e.target===document.getElementById('edit-modal')) closeEdit(); }
function closeEdit(){ document.getElementById('edit-modal').style.display='none'; }

async function saveEdit() {
  var id     = document.getElementById('edit-id').value;
  var calId  = document.getElementById('edit-cal-id').value;
  var title  = document.getElementById('edit-title').value;
  var notes  = document.getElementById('edit-notes').value;
  var url    = document.getElementById('edit-url').value;
  var cat    = document.getElementById('edit-cat').value;
  var pri    = document.getElementById('edit-pri').value;
  var due    = document.getElementById('edit-due').value  || null;
  var nxt    = document.getElementById('edit-next').value || null;
  var dueCal = editCal.due;
  var nextCal= editCal.next;

  var saveBtn = document.getElementById('save-btn');
  saveBtn.disabled=true; saveBtn.innerHTML='<span class="spin"></span>';

  var patch = { title:title, notes:notes, url:url, category:cat, priority:pri, due_date:due, next_step_date:nxt };

  if((dueCal||nextCal) && (due||nxt)) {
    try {
      var calBody = { raw_input:title, add_to_calendar:true };
      if(due) calBody.due_date = due;
      if(nxt) calBody.next_step_date = nxt;
      calBody.priority = pri;
      calBody.category = cat;
      if(calId) calBody.update_event_id = calId;
      var r = await fetch(EDGE, {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+AK},
        body: JSON.stringify(calBody)
      });
      var d = await r.json();
      if(d.success && d.task) {
        if(d.task.calendar_event_id) patch.calendar_event_id = d.task.calendar_event_id;
        await api('/rest/v1/tasks?id=eq.'+d.task.id, {method:'DELETE'});
      }
    } catch(e) { console.error('Calendar error:',e); }
  }

  if(editAttachedFile) {
    var photoUrl = await uploadPhoto(editAttachedFile);
    if(photoUrl) patch.photo_url = photoUrl;
    editAttachedFile = null;
  }

  try{ await api('/rest/v1/tasks?id=eq.'+id, {method:'PATCH', body:JSON.stringify(patch)}); }catch(e){}
  var i=tasks.findIndex(function(t){return t.id===id;});
  if(i>-1)Object.assign(tasks[i],patch);
  closeEdit(); render();
  saveBtn.disabled=false; saveBtn.innerHTML='Save';
  st('Changes saved','ok');
}

function deleteTask(id) {
  var row=document.getElementById('row-'+id);
  if(!row)return;
  var conf=row.querySelector('.del-confirm');
  if(conf){conf.remove();return;}
  conf=document.createElement('div');
  conf.className='del-confirm'; conf.style.display='block';
  conf.innerHTML='<p>Delete permanently? This cannot be undone.</p>'
    +'<div class="del-confirm-btns">'
    +'<button class="btn ghost xs">Cancel</button>'
    +'<button class="btn danger xs" data-id="'+id+'" data-action="delete-confirm">Delete permanently</button>'
    +'</div>';
  conf.querySelector('.btn.ghost').onclick = function(){conf.remove();};
  row.querySelector('.rbody').appendChild(conf);
}

async function confirmDeleteCard(id) {
  try{await api('/rest/v1/tasks?id=eq.'+id,{method:'DELETE'});}catch(e){}
  tasks=tasks.filter(function(t){return t.id!==id;});
  counts(); render();
}

async function confirmDelete() {
  var id=document.getElementById('edit-id').value;
  try{await api('/rest/v1/tasks?id=eq.'+id,{method:'DELETE'});}catch(e){}
  tasks=tasks.filter(function(t){return t.id!==id;});
  closeEdit(); counts(); render();
}

function setTab(t,el) {
  tab=t;
  document.querySelectorAll('.c-tab').forEach(function(n){n.classList.remove('on');});
  if(el)el.classList.add('on');
  render();
}

var stT, stT2;
function st(msg,cls) {
  var el=document.getElementById('cap-st');
  el.textContent=msg; el.className='cap-status'+(cls?' '+cls:'');
  var gl=document.getElementById('global-st');
  if(gl){ gl.textContent=msg; gl.style.color=cls==='err'?'#8a2020':cls==='ok'?'#2a5e3e':'#7a6a5e'; }
  clearTimeout(stT); clearTimeout(stT2);
  if(cls==='ok'){
    stT=setTimeout(function(){el.textContent='';el.className='cap-status';},5000);
    stT2=setTimeout(function(){if(gl)gl.textContent='';},5000);
  }
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(r){r.unregister();});});
}

load();

</script>
